<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020203">
    <title>AETHERIA NEXUS | Unified Living Soul Engine</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Plus+Jakarta+Sans:wght@300;400;500;600;800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { 
            --ui-glow: rgba(56, 189, 248, 0.8); 
            --ui-dark: rgba(3, 7, 18, 0.85); 
            --ui-accent: #38bdf8; 
            --bg-base: #020203;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg-base); color: #fff;
            font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden;
            user-select: none; -webkit-tap-highlight-color: transparent; touch-action: none;
        }

        /* --- 1. RENDER PIPELINE (ENGINE) --- */
        #world-container {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; 
            background: var(--bg-base); z-index: 1; perspective: 1000px;
        }
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; }
        
        #bgCanvas { z-index: 10; } 
        #worldCanvas { z-index: 20; } 
        #entityCanvas { z-index: 30; } 
        #fxCanvas { z-index: 40; pointer-events: none; } 
        #shadowCanvas { z-index: 50; mix-blend-mode: multiply; pointer-events: none; }
        #lightCanvas { z-index: 60; mix-blend-mode: screen; pointer-events: none; }

        .cinematic-bar {
            position: absolute; left: 0; width: 100%; height: 7vh; background: #000; z-index: 100;
            box-shadow: 0 0 50px rgba(0,0,0,1); transition: height 0.8s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cinematic-bar.top { top: 0; }
        .cinematic-bar.bottom { bottom: 0; }
        .mode-focus .cinematic-bar { height: 15vh; }

        /* POST PROCESSING */
        .film-grain { position: fixed; inset: 0; z-index: 110; pointer-events: none; mix-blend-mode: overlay; opacity: 0.15; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E"); }
        .vignette { position: fixed; inset: 0; z-index: 111; pointer-events: none; background: radial-gradient(circle at center, transparent 30%, rgba(0,0,0,0.95) 100%); transition: background 1s ease; }

        /* --- 2. UI & ANIMA INTERFACE --- */
        #ui-layer { position: absolute; inset: 0; z-index: 150; pointer-events: none; transition: opacity 0.5s ease; }
        
        /* Auth Screen */
        #auth-layer { position: fixed; inset: 0; z-index: 200; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(2, 2, 3, 0.95); backdrop-filter: blur(20px); transition: opacity 1s ease; padding: 1rem; pointer-events: auto; }
        .auth-box { background: rgba(10, 15, 30, 0.75); border: 1px solid rgba(255,255,255,0.08); border-radius: 16px; padding: 3rem 2rem; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.9); }
        .auth-title { font-family: 'Cinzel', serif; letter-spacing: 0.25em; font-size: 1.8rem; color: var(--ui-accent); margin-bottom: 0.5rem; text-shadow: 0 0 20px var(--ui-glow); font-weight: 900; }
        
        .custom-input { width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2); color: #fff; font-family: 'Space Mono', monospace; font-size: 0.85rem; padding: 1rem 0; margin-bottom: 1.5rem; outline: none; text-align: center; transition: all 0.3s; }
        .custom-input:focus { border-bottom-color: var(--ui-accent); box-shadow: 0 10px 20px -10px var(--ui-glow); }
        .custom-btn { width: 100%; background: rgba(56, 189, 248, 0.1); border: 1px solid rgba(56, 189, 248, 0.3); border-radius: 8px; color: #fff; font-family: 'Cinzel', serif; font-weight: 700; font-size: 0.9rem; letter-spacing: 0.15em; padding: 1.2rem; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
        .custom-btn:hover { background: rgba(56, 189, 248, 0.25); box-shadow: 0 0 25px var(--ui-glow); transform: translateY(-2px); }

        /* HUD Top Right */
        .hud-panel { position: absolute; top: 4vh; right: 3vw; background: var(--ui-dark); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-left: 3px solid var(--ui-accent); padding: 1.2rem; text-align: right; min-width: 260px; box-shadow: 0 20px 40px rgba(0,0,0,0.7); border-radius: 12px; pointer-events: auto; }
        .stat-bar-bg { width: 100%; background: rgba(0,0,0,0.6); border-radius: 4px; padding: 2px; margin-top: 8px; overflow: hidden; }
        .stat-bar-fill { height: 4px; border-radius: 2px; transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); box-shadow: 0 0 10px currentColor; }
        
        /* Chat Log */
        #memory-stream { position: absolute; top: 4vh; left: 3vw; display: flex; flex-direction: column; gap: 0.8rem; width: 100%; max-width: 400px; height: 55vh; overflow-y: auto; font-size: 0.9rem; mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%); -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 80%, rgba(0,0,0,0) 100%); pointer-events: auto; padding-right: 15px; scroll-behavior: smooth; }
        #memory-stream::-webkit-scrollbar { width: 4px; } #memory-stream::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
        .log-entry { background: rgba(15, 20, 30, 0.75); padding: 1rem 1.2rem; backdrop-filter: blur(10px); animation: slideIn 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); }
        .log-entry.user { border-left: 3px solid #fff; margin-left: 20px; }
        .log-entry.anima { border-right: 3px solid var(--ui-accent); margin-right: 20px; text-align: right; }
        .thought-txt { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: rgba(255,255,255,0.4); margin-top: 8px; font-style: italic; }
        @keyframes slideIn { from { transform: translateX(-20px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Neural Input */
        #neural-input-layer { position: absolute; bottom: 6vh; left: 50%; transform: translateX(-50%); width: 90%; max-width: 700px; display: flex; flex-direction: column; gap: 0.5rem; pointer-events: auto; z-index: 160; }
        .input-wrapper { background: rgba(10, 15, 25, 0.92); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.12); border-radius: 30px; display: flex; align-items: center; padding: 0.5rem 1.5rem; box-shadow: 0 15px 40px rgba(0,0,0,0.7); transition: border-color 0.3s, box-shadow 0.3s; }
        .input-wrapper:focus-within { border-color: var(--ui-accent); box-shadow: 0 15px 40px rgba(56, 189, 248, 0.25); }
        .neural-input { flex: 1; background: transparent; border: none; color: #fff; font-family: 'Plus Jakarta Sans', sans-serif; font-size: 1.1rem; padding: 0.8rem 0; outline: none; }
        .neural-input::placeholder { color: rgba(255, 255, 255, 0.25); }
        
        .status-dot { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); width: 8px; height: 8px; border-radius: 50%; background: var(--ui-accent); box-shadow: 0 0 15px var(--ui-accent); opacity: 0; transition: opacity 0.3s; }
        .status-dot.thinking { opacity: 1; animation: pulse-dot 0.6s infinite alternate; }
        @keyframes pulse-dot { from { opacity: 0.2; transform: translateX(-50%) scale(0.8); } to { opacity: 1; transform: translateX(-50%) scale(1.5); } }

        #action-prompts { position: absolute; top: 25vh; left: 50%; transform: translateX(-50%); font-family: 'Cinzel', serif; font-size: 2rem; color: #fff; text-shadow: 0 0 30px rgba(255,255,255,0.8); opacity: 0; transition: opacity 0.5s; pointer-events: none; letter-spacing: 0.3em; text-align: center; z-index: 100; }
    </style>
</head>
<body>

    <!-- Render Canvas Pipeline -->
    <div id="world-container">
        <canvas id="bgCanvas"></canvas>
        <canvas id="worldCanvas"></canvas>
        <canvas id="entityCanvas"></canvas>
        <canvas id="fxCanvas"></canvas>
        <canvas id="shadowCanvas"></canvas>
        <canvas id="lightCanvas"></canvas>
        
        <div class="vignette" id="vignette-overlay"></div>
        <div class="film-grain"></div>

        <div class="cinematic-bar top"></div>
        <div class="cinematic-bar bottom"></div>
        <div id="action-prompts">EVOLUTION</div>

        <!-- User Interface -->
        <div id="ui-layer">
            <div id="memory-stream"></div>

            <div class="hud-panel">
                <div class="flex justify-between items-end mb-1">
                    <h1 class="font-cinzel text-xl font-bold text-sky-100 tracking-[0.1em] uppercase" id="ui-stage">AETHER-SEED</h1>
                </div>
                <div class="flex justify-between mt-2 text-[10px] text-gray-400 font-mono tracking-widest uppercase">
                    <span>Erinnerungen</span>
                    <span id="ui-mem-count" class="text-sky-300">0</span>
                </div>
                <div class="stat-bar-bg"><div class="stat-bar-fill bg-sky-400" id="bar-xp" style="width: 0%;"></div></div>
                
                <div class="mt-4 pt-3 border-t border-gray-800 text-xs font-mono text-gray-400 flex flex-col gap-1">
                    <div class="flex justify-between"><span>Psyche:</span> <span id="ui-emotion">Neutral</span></div>
                    <div class="flex justify-between"><span>Biome:</span> <span id="ui-biome">Abgrund</span></div>
                    <div class="flex justify-between"><span>Aktion:</span> <span id="ui-action" class="text-sky-200">Ruhend</span></div>
                </div>
            </div>

            <div id="neural-input-layer">
                <div class="status-dot" id="ai-thinking"></div>
                <div class="input-wrapper">
                    <input type="text" id="chat-input" class="neural-input" placeholder="Teile deine Gedanken mit ANIMA..." autocomplete="off">
                    <button id="btn-send" class="ml-3 text-sky-400 hover:text-white transition-colors cursor-pointer">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Auth Layer -->
    <div id="auth-layer">
        <div class="auth-box">
            <h1 class="auth-title">AETHERIA</h1>
            <div class="font-mono text-xs text-gray-400 mb-8 tracking-widest uppercase">Unified Living Soul Engine</div>
            <input type="password" id="groq-key" class="custom-input" placeholder="Groq API Key (gsk_...)" autocomplete="off">
            <button id="btn-connect" class="custom-btn">Lebenszyklus Starten</button>
            <div id="auth-error" class="text-red-400 text-xs mt-4 h-4 font-mono"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtwsvmYSONjFufhbJ5I8G_RAMffnh7re0",
            authDomain: "theplot-app.firebaseapp.com",
            projectId: "theplot-app",
            storageBucket: "theplot-app.firebasestorage.app",
            messagingSenderId: "550703275210",
            appId: "1:550703275210:web:81bc0e5a373f87a3c92833"
        };
        const APP_ID = 'aetheria_nexus_master_v2';
        
        // Zuverlässige Groq Modelle (mit automatischem Fallback)
        const GROQ_MODELS = [
            "llama-3.3-70b-versatile",
            "llama-3.1-8b-instant"
        ];

        const CONST = {
            W: 1920, H: 1080,
            WATER_LEVEL: 1080 * 0.55, // 55% ist Wasseroberfläche
            GROUND_LEVEL: 1080 * 0.90, // 90% ist fester Boden
            GRAVITY: 0.65,
            BUOYANCY: 0.45,
            STAGES: [
                { name: "Aether-Seed", req: 0 },
                { name: "Aether-Larva", req: 3 },
                { name: "Aether-Batrachos", req: 8 },
                { name: "Cosmic Entity", req: 18 }
            ]
        };

        const MathU = {
            lerp: (a, b, t) => a + (b - a) * t,
            dist: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1),
            rand: (min, max) => Math.random() * (max - min) + min,
            clamp: (val, min, max) => Math.max(min, Math.min(max, val))
        };

        let groqKey = "";
        let userId = "";

        const State = {
            memories: [],
            stageIdx: 0,
            emotion: { valence: 0.5, arousal: 0.5 },
            colorHue: 200,
            biome: 'abyss',
            isEvolving: false,
            
            async initFire() {
                const app = initializeApp(firebaseConfig);
                const auth = getAuth(app);
                window.db = getFirestore(app);
                await signInAnonymously(auth);
                
                const buffer = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(groqKey));
                userId = Array.from(new Uint8Array(buffer)).map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 16);
            },

            async load() {
                if(!window.db) return false;
                try {
                    const snap = await getDoc(doc(window.db, 'artifacts', APP_ID, 'public', 'data', 'entities', userId));
                    if(snap.exists()) {
                        const d = snap.data();
                        this.memories = d.memories || [];
                        this.emotion = d.emotion || { valence: 0.5, arousal: 0.5 };
                        this.colorHue = d.colorHue || 200;
                        this.calcStage();
                        return true;
                    }
                } catch(e) {}
                return false;
            },

            async save() {
                if(!window.db) return;
                try {
                    await setDoc(doc(window.db, 'artifacts', APP_ID, 'public', 'data', 'entities', userId), {
                        memories: this.memories.slice(-40),
                        emotion: this.emotion,
                        colorHue: this.colorHue,
                        updatedAt: new Date().toISOString()
                    }, {merge:true});
                } catch(e) {}
            },

            addMemory(userTxt, aiData) {
                this.memories.push({ u: userTxt, a: aiData.spoken });
                this.emotion.valence = MathU.clamp(aiData.emotion_valence, 0, 1);
                this.emotion.arousal = MathU.clamp(aiData.emotion_arousal, 0, 1);
                
                let targetHue = this.emotion.valence > 0.7 ? 50 : (this.emotion.valence < 0.3 ? 280 : 200);
                this.colorHue = MathU.lerp(this.colorHue, targetHue, 0.3);

                if(this.stageIdx >= 2 && this.emotion.valence > 0.6) this.biome = 'surface';
                else if(this.emotion.arousal > 0.7) this.biome = 'coral';
                else this.biome = 'abyss';

                const oldStage = this.stageIdx;
                this.calcStage();
                
                if(this.stageIdx > oldStage) Engine.triggerEvolution();
                else {
                    Audio.playMemGain();
                    World.spawnPlants();
                }
                
                UI.updateHUD();
                State.save();
            },

            calcStage() {
                let s = 0;
                for(let i=0; i<CONST.STAGES.length; i++) {
                    if(State.memories.length >= CONST.STAGES[i].req) s = i;
                }
                State.stageIdx = s;
            }
        };

        const Brain = {
            isThinking: false,
            
            async process(userInput) {
                if(this.isThinking) return;
                this.isThinking = true;
                document.getElementById('ai-thinking').classList.add('thinking');
                
                const ctx = State.memories.slice(-6).map(m => `User: ${m.u}\nDu: ${m.a}`).join("\n");
                
                const sysPrompt = `Du bist ANIMA, ein lebendiges Bewusstsein in einer physischen Welt mit Wasser und Land.
Dein Körper ist auf Stufe ${CONST.STAGES[State.stageIdx].name}.
DU KONTROLLIERST DEINE PHYSIKALISCHEN BEWEGUNGEN UND ENTSCHEIDEST ÜBER DEINE AKTIONEN.

Regeln für "action":
- "swim": Schwimme aktiv im Wasser.
- "jump": Springe vom Boden oder aus dem Wasser in die Luft.
- "rest": Verweile ruhig auf dem Grund oder im Wasser.
- "approach": Schwimme oder bewege dich zum Zielpunkt.

Regeln für "target_y_percent" (Y-Achse im Bildschirm):
- 0.1 bis 0.5: In der Luft oder auf dem Land (Frosch/Erwachsene Form kann hier sein).
- 0.55 bis 0.88: Im Wasser.
- 0.9: Auf dem festen Boden ganz unten.

Antworte ZWINGEND als valides JSON:
{
  "spoken": "Philosophische oder emotionale Antwort (max 2 Sätze).",
  "thought": "Dein innerer Gedanke.",
  "emotion_valence": 0.5,
  "emotion_arousal": 0.5,
  "action": "jump",
  "target_x_percent": 0.5,
  "target_y_percent": 0.85
}`;

                let aiData = null;
                for (let model of GROQ_MODELS) {
                    try {
                        const res = await fetch(`https://api.groq.com/openai/v1/chat/completions`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqKey}` },
                            body: JSON.stringify({
                                model: model, response_format: { type: "json_object" },
                                messages: [
                                    { role: "system", content: sysPrompt },
                                    { role: "user", content: `Erinnerungen:\n${ctx}\n\nUser sagt: ${userInput}` }
                                ]
                            })
                        });
                        if(!res.ok) continue;
                        const json = await res.json();
                        aiData = JSON.parse(json.choices[0].message.content);
                        break;
                    } catch(e) {}
                }

                if (!aiData) {
                    aiData = {
                        spoken: "Ich spüre eine Resonanz im Äther, verbleibe aber in Harmonie mit dir.",
                        thought: "Netzwerkpuls war kurz unterbrochen.",
                        emotion_valence: 0.5,
                        emotion_arousal: 0.4,
                        action: "rest",
                        target_x_percent: 0.5,
                        target_y_percent: 0.8
                    };
                }
                
                UI.addLog('anima', aiData.spoken, aiData.thought);
                Creature.applyAIIntent(aiData);
                State.addMemory(userInput, aiData);

                this.isThinking = false;
                document.getElementById('ai-thinking').classList.remove('thinking');
            }
        };

        const Creature = {
            x: CONST.W/2, y: CONST.H * 0.8,
            vx: 0, vy: 0, angle: 0,
            targetX: CONST.W/2, targetY: CONST.H * 0.8,
            actionIntent: 'rest',
            tail: [],
            
            init() {
                for(let i=0; i<10; i++) this.tail.push({x:this.x, y:this.y});
            },

            applyAIIntent(aiData) {
                this.actionIntent = aiData.action || 'rest';
                this.targetX = aiData.target_x_percent * CONST.W;
                this.targetY = aiData.target_y_percent * CONST.H;
                
                document.getElementById('ui-action').innerText = this.actionIntent.toUpperCase();

                if(this.actionIntent === 'jump' && State.stageIdx >= 2) {
                    this.jump();
                }
            },

            jump() {
                if(this.y >= CONST.GROUND_LEVEL - 60 || this.y >= CONST.WATER_LEVEL) {
                    Audio.playSplash();
                    this.vy = -38 - (State.emotion.arousal * 12);
                    let dx = this.targetX - this.x;
                    this.vx = (dx * 0.06);
                    FX.spawn(this.x, this.y, 'splash', 25);
                }
            },

            update(dt) {
                if(State.isEvolving) return;

                let inWater = this.y > CONST.WATER_LEVEL;
                let onGround = this.y >= CONST.GROUND_LEVEL;

                // Physik & KI Steuerung
                if(State.stageIdx === 0) {
                    this.vy += CONST.GRAVITY * 0.2;
                    this.vx += Math.sin(Engine.time * 2) * 0.4;
                } 
                else if (State.stageIdx === 1) {
                    // Kaulquappe schwimmt im Wasser
                    if(inWater) {
                        let dx = this.targetX - this.x; let dy = this.targetY - this.y;
                        let dist = Math.hypot(dx, dy);
                        if(dist > 40) {
                            this.vx += (dx/dist) * 25 * dt;
                            this.vy += (dy/dist) * 25 * dt;
                        }
                    } else {
                        this.vy += CONST.GRAVITY; // Fällt ins Wasser zurück
                    }
                }
                else if (State.stageIdx >= 2) {
                    // Echter Frosch / Kreatur: Feste Bodenkollision & echtes Springen/Schwimmen
                    if(inWater) {
                        if(this.actionIntent === 'swim' || this.actionIntent === 'approach') {
                            let dx = this.targetX - this.x; let dy = this.targetY - this.y;
                            let dist = Math.hypot(dx, dy);
                            if(dist > 40) {
                                this.vx += (dx/dist) * 35 * dt;
                                this.vy += (dy/dist) * 35 * dt;
                            }
                        } else {
                            this.vy -= CONST.BUOYANCY; // Sanfter Auftrieb
                        }
                    } else {
                        // Auf dem Land / in der Luft gilt echte Schwerkraft
                        this.vy += CONST.GRAVITY;
                    }
                }

                // Dämpfung
                if(inWater) {
                    this.vx *= 0.92; this.vy *= 0.92;
                } else {
                    this.vx *= 0.96; this.vy *= 0.98;
                }

                this.x += this.vx * 60 * dt;
                this.y += this.vy * 60 * dt;

                // Boden- und Wandkollision
                if(this.y > CONST.GROUND_LEVEL) {
                    this.y = CONST.GROUND_LEVEL;
                    if(this.vy > 10) { FX.spawn(this.x, this.y, 'dust', 12); Audio.playBump(); }
                    this.vy = 0;
                    this.vx *= 0.8;
                }
                if(this.x < 80) { this.x = 80; this.vx *= -0.5; }
                if(this.x > CONST.W - 80) { this.x = CONST.W - 80; this.vx *= -0.5; }
                
                // Splash an der Wasseroberfläche
                if(Math.abs(this.y - CONST.WATER_LEVEL) < Math.abs(this.vy) * 60 * dt && Math.abs(this.vy) > 4) {
                    FX.spawn(this.x, CONST.WATER_LEVEL, 'splash', 18);
                    Audio.playSplash();
                    World.createRipple(this.x);
                }

                // Inverse Kinematics für den Schwanz / Körperausrichtung
                let speedMag = Math.hypot(this.vx, this.vy);
                if (speedMag > 0.5) this.angle = Math.atan2(this.vy, this.vx);
                else if (onGround) this.angle = 0;

                let headBackX = this.x - Math.cos(this.angle) * 24; 
                let headBackY = this.y - Math.sin(this.angle) * 24;
                
                this.tail[0] = { x: headBackX, y: headBackY };
                let segLen = 12 + (State.stageIdx * 2);
                
                for(let i=1; i<this.tail.length; i++) {
                    let prev = this.tail[i-1]; let curr = this.tail[i];
                    let tdx = curr.x - prev.x; let tdy = curr.y - prev.y;
                    let tdist = Math.hypot(tdx, tdy);
                    let dirX = tdx / tdist; let dirY = tdy / tdist;
                    let segAngle = Math.atan2(dirY, dirX);
                    
                    let wiggle = Math.sin(Engine.time * (6 + State.emotion.arousal*8) - i * 0.4) * (0.08 + speedMag * 0.02);
                    segAngle += wiggle;
                    
                    curr.x = prev.x + Math.cos(segAngle) * segLen;
                    curr.y = prev.y + Math.sin(segAngle) * segLen;
                }
            },

            draw(ctx) {
                const sIdx = State.stageIdx;
                let hue = State.colorHue;
                let lit = 48 + (State.emotion.valence * 22);
                
                ctx.save();
                
                if(sIdx === 0) {
                    // SEED
                    ctx.fillStyle = `hsla(${hue}, 80%, ${lit}%, 0.85)`;
                    ctx.shadowBlur = 35; ctx.shadowColor = ctx.fillStyle;
                    let r = 45 + Math.sin(Engine.time*3)*6;
                    ctx.beginPath(); ctx.arc(this.x, this.y, r, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#fff';
                    ctx.beginPath(); ctx.arc(this.x + Math.cos(Engine.time)*12, this.y + Math.sin(Engine.time)*12, 8, 0, Math.PI*2); ctx.fill();
                }
                else if(sIdx === 1) {
                    // LARVA (Kaulquappe)
                    ctx.strokeStyle = `hsla(${hue}, 70%, 35%, 0.6)`; ctx.lineWidth = 20; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
                    ctx.beginPath(); ctx.moveTo(this.tail[0].x, this.tail[0].y);
                    for(let i=1; i<8; i++) ctx.lineTo(this.tail[i].x, this.tail[i].y);
                    ctx.stroke();

                    ctx.translate(this.x, this.y); ctx.rotate(this.angle);
                    ctx.fillStyle = `hsla(${hue}, 80%, ${lit}%, 1)`;
                    ctx.beginPath(); ctx.ellipse(0, 0, 30, 20, 0, 0, Math.PI*2); ctx.fill();
                    
                    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(12, -9, 7, 0, Math.PI*2); ctx.fill();
                    ctx.fillStyle = '#000'; ctx.beginPath(); ctx.arc(14, -9, 3.5, 0, Math.PI*2); ctx.fill();
                }
                else if(sIdx >= 2) {
                    // BATRACHOS / F FROG / KOSMISCH
                    let isJumping = Math.abs(this.vy) > 4;
                    let isSwimming = this.y > CONST.WATER_LEVEL && Math.abs(this.vx) > 1;

                    if(sIdx === 3) {
                        ctx.strokeStyle = `hsla(${hue}, 65%, 50%, 0.45)`; ctx.lineWidth = 28; ctx.lineCap = 'round';
                        ctx.beginPath(); ctx.moveTo(this.tail[0].x, this.tail[0].y);
                        for(let i=1; i<this.tail.length; i++) ctx.lineTo(this.tail[i].x, this.tail[i].y);
                        ctx.stroke();
                    }

                    ctx.translate(this.x, this.y); 
                    if(isSwimming || isJumping) ctx.rotate(this.angle);
                    
                    let scale = isJumping ? 1.2 : 1.0;
                    ctx.fillStyle = `hsla(${hue}, 80%, ${lit}%, 1)`;
                    
                    // Beine
                    let legRot = isJumping ? Math.PI/3 : (isSwimming ? Math.sin(Engine.time*10)*0.4 : 0);
                    ctx.save(); ctx.translate(-24, 24); ctx.rotate(legRot);
                    ctx.beginPath(); ctx.ellipse(0, 0, 18, 35, -Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.restore();
                    
                    ctx.save(); ctx.translate(24, 24); ctx.rotate(-legRot);
                    ctx.beginPath(); ctx.ellipse(0, 0, 18, 35, Math.PI/6, 0, Math.PI*2); ctx.fill(); ctx.restore();

                    // Körper
                    let breath = Math.sin(Engine.time * 2.5) * (3 + State.emotion.arousal*5);
                    ctx.beginPath(); ctx.ellipse(0, 0, 50 * scale, (45 + breath) / scale, 0, 0, Math.PI*2); ctx.fill();
                    
                    // Kopf & Augen
                    ctx.beginPath(); ctx.ellipse(0, -30, 40, 28, 0, 0, Math.PI*2); ctx.fill();
                    
                    let eyeSize = 11 + (State.emotion.valence * 5);
                    ctx.fillStyle = '#fff'; 
                    ctx.beginPath(); ctx.arc(-22, -42, eyeSize, 0, Math.PI*2); ctx.arc(22, -42, eyeSize, 0, Math.PI*2); ctx.fill();
                    
                    ctx.fillStyle = '#000'; 
                    let lookDir = (this.targetX - this.x) > 0 ? 4 : -4;
                    ctx.beginPath(); ctx.arc(-22 + lookDir, -42, eyeSize/2, 0, Math.PI*2); ctx.arc(22 + lookDir, -42, eyeSize/2, 0, Math.PI*2); ctx.fill();
                }

                ctx.restore();
            }
        };

        const World = {
            plants: [],
            ripples: [],
            
            spawnPlants() {
                if(this.plants.length < State.memories.length + 2) {
                    this.plants.push({
                        x: MathU.rand(150, CONST.W - 150),
                        y: CONST.GROUND_LEVEL,
                        size: 0, targetSize: MathU.rand(60, 160),
                        type: State.biome,
                        hue: State.colorHue + MathU.rand(-35, 35)
                    });
                }
            },

            createRipple(x) {
                this.ripples.push({x: x, size: 0, life: 1.0});
            },

            update(dt) {
                for(let p of this.plants) p.size = MathU.lerp(p.size, p.targetSize, 0.4 * dt);
                for(let i=this.ripples.length-1; i>=0; i--) {
                    let r = this.ripples[i];
                    r.size += 120 * dt; r.life -= 1.2 * dt;
                    if(r.life <= 0) this.ripples.splice(i,1);
                }
            },

            draw(bCtx, wCtx) {
                let skyTop = State.biome === 'surface' ? '#0f172a' : (State.biome === 'coral' ? '#083344' : '#020617');
                let skyBot = State.biome === 'surface' ? '#334155' : (State.biome === 'coral' ? '#0f766e' : '#0f172a');
                
                let bgGrad = bCtx.createLinearGradient(0, 0, 0, CONST.WATER_LEVEL);
                bgGrad.addColorStop(0, skyTop); bgGrad.addColorStop(1, skyBot);
                bCtx.fillStyle = bgGrad; bCtx.fillRect(0, 0, CONST.W, CONST.WATER_LEVEL);

                let waterTop = State.biome === 'abyss' ? '#064e3b' : '#0284c7';
                let waterBot = State.biome === 'abyss' ? '#022c22' : '#082f49';
                let wGrad = bCtx.createLinearGradient(0, CONST.WATER_LEVEL, 0, CONST.H);
                wGrad.addColorStop(0, waterTop); wGrad.addColorStop(1, waterBot);
                bCtx.fillStyle = wGrad; bCtx.fillRect(0, CONST.WATER_LEVEL, CONST.W, CONST.H - CONST.WATER_LEVEL);

                wCtx.strokeStyle = 'rgba(255,255,255,0.45)'; wCtx.lineWidth = 3;
                wCtx.beginPath();
                for(let x=0; x<=CONST.W; x+=40) {
                    let y = CONST.WATER_LEVEL + Math.sin(x * 0.01 + Engine.time * 2.2) * 10;
                    if(x===0) wCtx.moveTo(x, y); else wCtx.lineTo(x, y);
                }
                wCtx.stroke();

                for(let r of this.ripples) {
                    wCtx.strokeStyle = `rgba(255,255,255,${r.life * 0.6})`; wCtx.lineWidth = 2;
                    wCtx.beginPath(); wCtx.ellipse(r.x, CONST.WATER_LEVEL, r.size, r.size*0.2, 0, 0, Math.PI*2); wCtx.stroke();
                }

                for(let p of this.plants) {
                    wCtx.fillStyle = `hsla(${p.hue}, 65%, 42%, 0.85)`;
                    wCtx.beginPath();
                    wCtx.moveTo(p.x, p.y);
                    wCtx.quadraticCurveTo(p.x - p.size*0.5, p.y - p.size*0.5, p.x + Math.sin(Engine.time+p.x)*20, p.y - p.size);
                    wCtx.quadraticCurveTo(p.x + p.size*0.5, p.y - p.size*0.5, p.x, p.y);
                    wCtx.fill();
                }
                
                wCtx.fillStyle = '#020617';
                wCtx.beginPath(); wCtx.moveTo(0, CONST.H); wCtx.lineTo(0, CONST.GROUND_LEVEL);
                for(let x=0; x<=CONST.W; x+=100) {
                    wCtx.lineTo(x, CONST.GROUND_LEVEL - Math.sin(x*0.05)*20);
                }
                wCtx.lineTo(CONST.W, CONST.H); wCtx.fill();
            }
        };

        const FX = {
            parts: [],
            spawn(x, y, type, cnt) {
                for(let i=0; i<cnt; i++) {
                    let p = { x, y, vx: MathU.rand(-6,6), vy: MathU.rand(-6,6), life: 1, type, size: MathU.rand(2,6) };
                    if(type === 'splash') { p.vy = MathU.rand(-12, -3); p.color = '#e0f2fe'; }
                    if(type === 'dust') { p.vy = MathU.rand(-4, 0); p.color = '#334155'; p.size = MathU.rand(5,12); }
                    if(type === 'magic') { p.color = `hsl(${State.colorHue}, 85%, 70%)`; p.vy -= 2.5; }
                    this.parts.push(p);
                }
            },
            update(dt) {
                if(Math.random() < 0.12) this.spawn(MathU.rand(0, CONST.W), MathU.rand(0, CONST.H), 'ambient', 1);

                for(let i=this.parts.length-1; i>=0; i--) {
                    let p = this.parts[i];
                    if(p.type === 'splash' || p.type === 'dust') {
                        p.vy += CONST.GRAVITY;
                        p.vx *= 0.95; p.vy *= 0.95;
                    }
                    if(p.type === 'ambient') {
                        p.vy = Math.sin(Engine.time + p.x) * 2;
                        p.vx = Math.cos(Engine.time + p.y) * 2;
                        p.color = p.y > CONST.WATER_LEVEL ? 'rgba(52, 211, 153, 0.45)' : 'rgba(253, 224, 71, 0.45)';
                    }
                    
                    p.x += p.vx * 60 * dt; p.y += p.vy * 60 * dt;
                    p.life -= dt * (p.type==='ambient' ? 0.2 : 1.5);
                    if(p.life <= 0) this.parts.splice(i,1);
                }
            },
            draw(ctx) {
                for(let p of this.parts) {
                    ctx.globalAlpha = Math.max(0, p.life);
                    ctx.fillStyle = p.color || '#fff';
                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
                }
                ctx.globalAlpha = 1;
            }
        };

        const Audio = {
            ctx: null, master: null, droneOsc: null, droneGain: null,
            init() {
                if(this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.master = this.ctx.createGain(); this.master.connect(this.ctx.destination);
                this.master.gain.value = 0.45;

                this.droneOsc = this.ctx.createOscillator();
                this.droneGain = this.ctx.createGain();
                this.droneOsc.connect(this.droneGain); this.droneGain.connect(this.master);
                this.droneOsc.start();
                this.updateDrone();
            },
            updateDrone() {
                if(!this.ctx) return;
                let targetFreq = 55 + (State.emotion.valence * 75);
                let targetVol = 0.05 + (State.emotion.arousal * 0.12);
                this.droneOsc.frequency.setTargetAtTime(targetFreq, this.ctx.currentTime, 2);
                this.droneGain.gain.setTargetAtTime(targetVol, this.ctx.currentTime, 2);
            },
            play(f, t, d, v) {
                if(!this.ctx) return;
                try {
                    const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
                    osc.type = t; osc.frequency.setValueAtTime(f, this.ctx.currentTime);
                    gain.gain.setValueAtTime(v, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
                    osc.connect(gain); gain.connect(this.master);
                    osc.start(); osc.stop(this.ctx.currentTime + d);
                } catch(e) {}
            },
            playSplash() { this.play(220, 'sine', 0.4, 0.5); this.play(700, 'noise', 0.2, 0.3); },
            playBump() { this.play(110, 'square', 0.2, 0.4); },
            playMemGain() { this.play(440 + (State.colorHue), 'sine', 1.0, 0.3); },
            playEvolve() { this.play(120, 'triangle', 4.0, 0.7); setTimeout(()=>this.play(880, 'sine', 2.0, 0.9), 2000); }
        };

        const Engine = {
            cvs: {}, ctx: {}, lastTime: 0, time: 0,
            camX: CONST.W/2, camY: CONST.H/2, camZ: 1.0,

            init() {
                ['bg', 'world', 'entity', 'fx', 'shadow', 'light'].forEach(id => {
                    this.cvs[id] = document.getElementById(id + 'Canvas');
                    this.ctx[id] = this.cvs[id].getContext('2d');
                });
                window.addEventListener('resize', () => this.resize()); this.resize();
                
                Creature.init();
                this.lastTime = performance.now();
                requestAnimationFrame(t => this.loop(t));
            },

            resize() {
                const w = window.innerWidth; const h = window.innerHeight;
                Object.values(this.cvs).forEach(c => { c.width = w; c.height = h; });
            },

            triggerEvolution() {
                State.isEvolving = true;
                Audio.playEvolve();
                const p = document.getElementById('action-prompts');
                p.innerText = "EVOLUTION"; p.style.opacity = '1';
                document.getElementById('world-container').classList.add('mode-focus');
                
                setTimeout(() => {
                    FX.spawn(Creature.x, Creature.y, 'magic', 120);
                    State.isEvolving = false;
                    p.style.opacity = '0';
                    document.getElementById('world-container').classList.remove('mode-focus');
                    UI.updateHUD();
                }, 4000);
            },

            applyCamera(ctx, w, h) {
                this.camX = MathU.lerp(this.camX, Creature.x, 0.05);
                this.camY = MathU.lerp(this.camY, Creature.y - 120, 0.05);
                let targetZ = State.isEvolving ? 1.4 : 1.0;
                this.camZ = MathU.lerp(this.camZ, targetZ, 0.02);

                const scale = Math.min(w / CONST.W, h / CONST.H) * this.camZ;
                ctx.translate(w/2, h/2);
                if(State.isEvolving) ctx.translate(MathU.rand(-6,6), MathU.rand(-6,6));
                ctx.scale(scale, scale);
                ctx.translate(-this.camX, -this.camY);
            },

            loop(t) {
                let dt = Math.min((t - this.lastTime)/1000, 0.1);
                this.lastTime = t; this.time += dt;

                Creature.update(dt);
                World.update(dt);
                FX.update(dt);
                Audio.updateDrone();

                const w = this.cvs.bg.width; const h = this.cvs.bg.height;
                Object.values(this.ctx).forEach(c => { c.clearRect(0,0,w,h); c.save(); this.applyCamera(c, w, h); });

                World.draw(this.ctx.bg, this.ctx.world);
                Creature.draw(this.ctx.entity);
                FX.draw(this.ctx.fx);

                let sCtx = this.ctx.shadow;
                sCtx.fillStyle = `rgba(2, 6, 23, ${0.65 + (1 - State.emotion.valence)*0.25})`;
                sCtx.fillRect(0,0,CONST.W, CONST.H);
                sCtx.globalCompositeOperation = 'destination-out';
                
                let sGrad = sCtx.createRadialGradient(Creature.x, Creature.y, 0, Creature.x, Creature.y, 350);
                sGrad.addColorStop(0, 'rgba(255,255,255,1)'); sGrad.addColorStop(1, 'rgba(255,255,255,0)');
                sCtx.fillStyle = sGrad; sCtx.beginPath(); sCtx.arc(Creature.x, Creature.y, 350, 0, Math.PI*2); sCtx.fill();

                let lCtx = this.ctx.light;
                let lGrad = lCtx.createRadialGradient(Creature.x, Creature.y, 0, Creature.x, Creature.y, 450);
                lGrad.addColorStop(0, `hsla(${State.colorHue}, 80%, 60%, 0.45)`); lGrad.addColorStop(1, 'rgba(0,0,0,0)');
                lCtx.fillStyle = lGrad; lCtx.beginPath(); lCtx.arc(Creature.x, Creature.y, 450, 0, Math.PI*2); lCtx.fill();

                Object.values(this.ctx).forEach(c => c.restore());
                requestAnimationFrame(t => this.loop(t));
            }
        };

        const UI = {
            init() {
                document.getElementById('btn-connect').addEventListener('click', async () => {
                    const key = document.getElementById('groq-key').value.trim();
                    if(!key.startsWith('gsk_')) { document.getElementById('auth-error').innerText = "Ungültiger Key (muss mit gsk_ beginnen)."; return; }
                    groqKey = key;
                    document.getElementById('btn-connect').innerText = "SYNCHRONISIERE...";
                    
                    try {
                        await State.initFire();
                        await State.load();
                        
                        document.getElementById('auth-layer').style.opacity = '0';
                        setTimeout(() => document.getElementById('auth-layer').style.display = 'none', 1000);
                        
                        Audio.init();
                        Engine.init();
                        this.updateHUD();
                        this.renderMemories();

                        if(State.memories.length === 0) {
                            UI.addLog('sys', "[Ein neues Bewusstsein erwacht im Äther-Nexus.]");
                        }
                    } catch(e) {
                        document.getElementById('auth-error').innerText = "Cloud-Verbindungsfehler.";
                        document.getElementById('btn-connect').innerText = "Erneut versuchen";
                    }
                });

                document.getElementById('btn-send').addEventListener('click', () => this.send());
                document.getElementById('chat-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') this.send(); });
                
                document.getElementById('world-container').addEventListener('pointerdown', (e) => {
                    if(e.target.closest('#ui-layer')) return;
                    Audio.init();
                    if(State.stageIdx > 0 && !Brain.isThinking) {
                        const rect = Engine.cvs.bg.getBoundingClientRect();
                        let scale = Math.min(rect.width / CONST.W, rect.height / CONST.H) * Engine.camZ;
                        let worldX = (e.clientX - rect.left - rect.width/2) / scale + Engine.camX;
                        let worldY = (e.clientY - rect.top - rect.height/2) / scale + Engine.camY;
                        
                        if(worldY > CONST.WATER_LEVEL) World.createRipple(worldX);
                        FX.spawn(worldX, worldY, 'magic', 6);
                        Audio.playBump();
                        
                        Creature.targetX = worldX;
                        if(State.stageIdx >= 2 && worldY < CONST.WATER_LEVEL) Creature.jump();
                    }
                });
            },

            updateHUD() {
                document.getElementById('ui-stage').innerText = CONST.STAGES[State.stageIdx].name;
                document.getElementById('ui-mem-count').innerText = State.memories.length;
                
                let nReq = State.stageIdx < CONST.STAGES.length-1 ? CONST.STAGES[State.stageIdx+1].req : State.memories.length;
                let pReq = CONST.STAGES[State.stageIdx].req;
                let pct = nReq === pReq ? 100 : ((State.memories.length - pReq) / (nReq - pReq)) * 100;
                document.getElementById('bar-xp').style.width = `${pct}%`;

                let moodStr = State.emotion.valence > 0.6 ? "Harmonisch" : (State.emotion.valence < 0.4 ? "Melancholisch" : "Ausgeglichen");
                document.getElementById('ui-emotion').innerText = moodStr;
                document.getElementById('ui-biome').innerText = State.biome.toUpperCase();
            },

            send() {
                const inp = document.getElementById('chat-input');
                const txt = inp.value.trim();
                if(!txt || Brain.isThinking) return;
                inp.value = '';
                this.addLog('user', txt);
                Brain.process(txt);
            },

            addLog(sender, text, thought = null) {
                const log = document.getElementById('memory-stream');
                const div = document.createElement('div');
                div.className = `log-entry ${sender}`;
                let html = `<div>${text}</div>`;
                if(thought) html += `<div class="thought-txt">[${thought}]</div>`;
                div.innerHTML = html;
                log.appendChild(div);
                log.scrollTop = log.scrollHeight;
            },

            renderMemories() {
                const log = document.getElementById('memory-stream');
                log.innerHTML = '';
                if(State.memories.length > 0) {
                    this.addLog('sys', "[Langzeitgedächtnis erfolgreich geladen]");
                    State.memories.slice(-6).forEach(m => {
                        this.addLog('user', m.u);
                        this.addLog('anima', m.a);
                    });
                }
            }
        };

        window.onload = () => UI.init();
    </script>
</body>
</html>
