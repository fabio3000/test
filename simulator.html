<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Aetheria: AAA Perfect Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --ui-glow: rgba(56, 189, 248, 0.8);
            --ui-dark: rgba(3, 7, 18, 0.85);
            --ui-accent: #38bdf8;
        }
        
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: #000; overflow: hidden;
            user-select: none; touch-action: none;
            font-family: 'Plus Jakarta Sans', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        #game-container {
            position: absolute; inset: 0; display: flex; justify-content: center; align-items: center; background: #000;
        }

        /* HD-2D Pipeline */
        canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; transform-origin: center center; }
        #bgCanvas { z-index: 1; }
        #mainCanvas { z-index: 10; }
        #shadowCanvas { z-index: 20; mix-blend-mode: multiply; pointer-events: none; }
        #lightCanvas { z-index: 30; mix-blend-mode: screen; pointer-events: none; }

        .cinematic-bar {
            position: absolute; left: 0; width: 100%; height: 8vh;
            background: #000; z-index: 50; box-shadow: 0 0 80px rgba(0,0,0,1);
            transition: height 0.6s cubic-bezier(0.25, 1, 0.5, 1);
        }
        .cinematic-bar.top { top: 0; }
        .cinematic-bar.bottom { bottom: 0; }
        .mode-action .cinematic-bar { height: 18vh; }
        .mode-evolving .cinematic-bar { height: 20vh; }

        /* UI Layer */
        .ui-layer {
            position: absolute; inset: 0; z-index: 60; pointer-events: none;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .mode-action .ui-layer, .mode-evolving .ui-layer { opacity: 0; transform: translateY(20px); }

        .hud-top {
            position: absolute; top: 5vh; left: 50%; transform: translateX(-50%);
            background: var(--ui-dark); backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.05); border-bottom: 2px solid var(--ui-accent);
            padding: 1rem 2rem; text-align: center; min-width: 340px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.8); border-radius: 12px; pointer-events: auto;
        }

        .hud-actions {
            position: absolute; bottom: 12vh; left: 50%; transform: translateX(-50%);
            display: flex; gap: 24px; pointer-events: auto;
        }

        .action-btn {
            background: rgba(10, 15, 30, 0.8); border: 1px solid rgba(255,255,255,0.1);
            color: #fff; width: 85px; height: 85px; border-radius: 20px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: all 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); cursor: pointer; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.6); position: relative; overflow: hidden;
        }
        .action-btn:active { transform: scale(0.9); border-color: var(--ui-accent); box-shadow: 0 0 30px var(--ui-glow); }
        .action-btn span.icon { font-size: 34px; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.6)); transition: transform 0.2s; }
        .action-btn:active span.icon { transform: translateY(-4px); }

        .progress-container { width: 100%; background: rgba(0,0,0,0.8); border-radius: 4px; padding: 2px; margin-top: 6px; }
        .progress-fill { height: 4px; border-radius: 2px; transition: width 0.4s ease-out; box-shadow: 0 0 10px currentColor; }
        
        #env-indicator { position: absolute; top: 20px; right: 25px; font-family: monospace; font-size: 10px; color: var(--ui-accent); text-align: right; text-shadow: 0 2px 4px #000; }

        /* Der Prompt ist nun standardmäßig unsichtbar */
        #cinematic-prompt {
            position: absolute; top: 22vh; left: 50%; transform: translateX(-50%);
            font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 800; color: #fff;
            text-shadow: 0 0 30px rgba(56, 189, 248, 1), 0 0 10px #000;
            opacity: 0; transition: opacity 0.3s; z-index: 100; pointer-events: none; letter-spacing: 0.2em; text-align: center;
        }
        .pulse-text { animation: pulseText 1.5s infinite; }
        @keyframes pulseText { 0% { transform: translateX(-50%) scale(1); opacity: 0.8; } 50% { transform: translateX(-50%) scale(1.05); opacity: 1; } 100% { transform: translateX(-50%) scale(1); opacity: 0.8; } }

        .font-cinzel { font-family: 'Cinzel', serif; }
    </style>
</head>
<body>

    <div id="game-container">
        <!-- Render Pipeline -->
        <canvas id="mainCanvas"></canvas>
        <canvas id="shadowCanvas"></canvas>
        <canvas id="lightCanvas"></canvas>

        <div class="cinematic-bar top"></div>
        <div class="cinematic-bar bottom"></div>
        
        <!-- style="opacity: 0;" erzwingt die Unsichtbarkeit von Anfang an -->
        <div id="cinematic-prompt" class="pulse-text" style="opacity: 0;">BILDSCHIRM HALTEN</div>

        <!-- UI Layer -->
        <div class="ui-layer" id="ui-layer">
            
            <div id="env-indicator">
                <div id="env-time">Aether-Zyklus aktiv</div>
                <div id="env-weather" class="text-slate-300">Wetter: Klar</div>
            </div>

            <div class="hud-top">
                <div class="flex justify-between items-end mb-2">
                    <h1 class="font-cinzel text-xl font-black text-sky-100 tracking-[0.2em] uppercase" id="ui-stage-name">Aether-Ei</h1>
                    <span class="text-[10px] text-sky-400 font-mono font-bold tracking-widest" id="ui-lvl">LVL 1</span>
                </div>
                <div class="progress-container mb-1"><div class="progress-fill bg-sky-400" id="bar-xp" style="width: 0%;"></div></div>
            </div>

            <!-- Action Buttons -->
            <div class="hud-actions" id="hud-actions">
                <button class="action-btn" id="btn-interact" title="Interagieren">
                    <span class="icon" id="btn-icon">✨</span>
                    <span class="text-[9px] mt-2 text-slate-200 font-bold tracking-wider" id="btn-text">WÄRMEN</span>
                </button>
            </div>
            
        </div>
    </div>

<script>
/**
 * AETHERIA - AAA PERFECT EDITION
 * - Bugfreies UI (Prompt verschwindet korrekt)
 * - Perfekte Invers-Kinematik für den Schwanz
 * - AAA Morph-Evolution Animation
 * - Strikte Wassergrenzen
 */

const CONSTANTS = {
    PIXEL_W: 800,  
    PIXEL_H: 450,
    GRAVITY: 0.3,
    FRICTION: 0.95,
    WATER_LINE: 0.45 // 45% der Bildschirmhöhe
};

const MathUtils = {
    lerp: (a, b, t) => a + (b - a) * t,
    distance: (x1, y1, x2, y2) => Math.hypot(x2 - x1, y2 - y1),
    randomRange: (min, max) => Math.random() * (max - min) + min
};

// --- AUDIO SYNTHESIZER ---
const AudioEngine = {
    ctx: null, master: null,
    init() { 
        if (!this.ctx) {
            this.ctx = new (window.AudioContext || window.webkitAudioContext)(); 
            this.master = this.ctx.createGain(); this.master.connect(this.ctx.destination);
            this.master.gain.value = 0.5;
        }
        if (this.ctx.state === 'suspended') this.ctx.resume(); 
    },
    playTone(f, t, d, v, slideTo = null) {
        try {
            this.init(); const osc = this.ctx.createOscillator(); const gain = this.ctx.createGain();
            osc.type = t; osc.frequency.setValueAtTime(f, this.ctx.currentTime);
            if(slideTo) osc.frequency.exponentialRampToValueAtTime(slideTo, this.ctx.currentTime + d);
            gain.gain.setValueAtTime(v, this.ctx.currentTime); 
            gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + d);
            osc.connect(gain); gain.connect(this.master); osc.start(); osc.stop(this.ctx.currentTime + d);
        } catch(e) {}
    },
    playShatter() { this.playTone(1500, 'square', 0.15, 0.4); this.playTone(2500, 'sine', 0.4, 0.2); },
    playPop() { this.playTone(600, 'triangle', 0.1, 0.6, 200); },
    playSplash() { this.playTone(300, 'noise', 0.2, 0.5); },
    playDash() { this.playTone(150, 'sine', 0.4, 0.5, 600); },
    playEvolveStart() { this.playTone(100, 'sine', 3.0, 0.6, 800); }, // Langes Aufladen
    playEvolveBoom() { this.playTone(800, 'sine', 2.0, 0.7, 50); this.playTone(200, 'square', 1.0, 0.5); } // Explosion
};

// --- KAMERA SYSTEM ---
class Camera {
    constructor() {
        this.x = CONSTANTS.PIXEL_W / 2; this.y = CONSTANTS.PIXEL_H / 2;
        this.targetX = this.x; this.targetY = this.y;
        this.zoom = 1.0; this.targetZoom = 1.0;
        this.timeScale = 1.0; this.targetTimeScale = 1.0;
        this.shakeAmount = 0;
    }
    shake(amount) { this.shakeAmount = amount; }
    update(dt) {
        this.x = MathUtils.lerp(this.x, this.targetX, 5 * dt);
        this.y = MathUtils.lerp(this.y, this.targetY, 5 * dt);
        this.zoom = MathUtils.lerp(this.zoom, this.targetZoom, 4 * dt);
        this.timeScale = MathUtils.lerp(this.timeScale, this.targetTimeScale, 6 * dt);
        if (this.shakeAmount > 0) {
            this.shakeAmount *= 0.85;
            if (this.shakeAmount < 0.5) this.shakeAmount = 0;
        }
    }
    screenToWorld(screenX, screenY, screenW, screenH) {
        const totalScale = Math.min(screenW / CONSTANTS.PIXEL_W, screenH / CONSTANTS.PIXEL_H) * this.zoom;
        return {
            x: (screenX - screenW/2) / totalScale + this.x,
            y: (screenY - screenH/2) / totalScale + this.y
        };
    }
    applyTransform(ctx, screenW, screenH) {
        const totalScale = Math.min(screenW / CONSTANTS.PIXEL_W, screenH / CONSTANTS.PIXEL_H) * this.zoom;
        ctx.translate(screenW/2, screenH/2);
        if (this.shakeAmount > 0) ctx.translate(MathUtils.randomRange(-this.shakeAmount, this.shakeAmount), MathUtils.randomRange(-this.shakeAmount, this.shakeAmount));
        ctx.scale(totalScale, totalScale);
        ctx.translate(-this.x, -this.y);
    }
}

// --- PARTIKEL ---
class ParticleSystem {
    constructor() { this.particles = []; }
    spawn(x, y, type, count) {
        for(let i=0; i<count; i++) {
            let p = { x, y, life: 1.0, type, vx: MathUtils.randomRange(-6, 6), vy: MathUtils.randomRange(-6, 6), size: MathUtils.randomRange(2,4), color: '#fff', angle: Math.random()*Math.PI*2, dist: 0 };
            if(type === 'magic') { p.color = '#38bdf8'; p.vy -= 2; }
            if(type === 'glass') { p.color = '#e0f2fe'; p.vy -= 3; }
            if(type === 'blood') { p.color = '#84cc16'; p.size = MathUtils.randomRange(3,6); }
            if(type === 'eat') { p.color = '#fef08a'; p.size = 3; }
            if(type === 'evolve') { p.color = '#38bdf8'; p.vx = 0; p.vy = 0; p.dist = MathUtils.randomRange(40, 100); } // Spirale nach innen
            this.particles.push(p);
        }
    }
    update(dt, globalTime) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            let p = this.particles[i];
            
            if(p.type === 'evolve') {
                // Dreht sich spiralförmig nach innen
                p.angle += 5 * dt;
                p.dist -= 30 * dt;
                p.x = GameEngine.Creature.x + Math.cos(p.angle) * p.dist;
                p.y = GameEngine.Creature.y + Math.sin(p.angle) * p.dist - 10;
                if(p.dist <= 0) p.life = 0;
            } else {
                p.vy += CONSTANTS.GRAVITY;
                p.vx *= CONSTANTS.FRICTION; p.vy *= CONSTANTS.FRICTION;
                p.x += p.vx * 60 * dt; p.y += p.vy * 60 * dt;
                p.life -= dt * 1.5;
            }
            if (p.life <= 0) this.particles.splice(i, 1);
        }
    }
    draw(ctx) {
        for (let p of this.particles) {
            ctx.globalAlpha = Math.max(0, p.life);
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        }
        ctx.globalAlpha = 1.0;
    }
}

// --- EVOLUTIONÄRE KREATUR ---
class Creature {
    constructor() {
        this.stage = 0; // 0=Ei, 1=Kaulquappe, 2=Frosch
        this.xp = 0; this.maxXp = 100;
        
        this.anchorX = CONSTANTS.PIXEL_W / 2;
        this.anchorY = CONSTANTS.PIXEL_H * 0.7; // Felsen im Wasser
        this.x = this.anchorX; this.y = this.anchorY;
        this.angle = 0; // Speichert den Blickwinkel (für IK)
        
        // IK Kaulquappe
        this.tail = []; for(let i=0; i<5; i++) this.tail.push({x:this.x, y:this.y});
        this.vx = 0; this.vy = 0; this.wanderTarget = {x: this.x, y: this.y};
        this.wanderTimer = 0;

        // Frosch Zunge
        this.headX = this.x; this.headY = this.y - 30;
        this.tongue = { active: false, phase: 'idle', progress: 0, tx: 0, ty: 0 };
    }

    startEvolution() {
        GameEngine.State.set('EVOLVING');
        AudioEngine.playEvolveStart();
        
        // Kamera in Szene setzen
        GameEngine.Camera.targetZoom = 1.5;
        GameEngine.Camera.targetX = this.x;
        GameEngine.Camera.targetY = this.y;
    }

    addXP(amount) {
        this.xp += amount;
        document.getElementById('bar-xp').style.width = `${Math.min(100, (this.xp/this.maxXp)*100)}%`;
        if (this.xp >= this.maxXp && this.stage < 2) {
            setTimeout(() => this.startEvolution(), 1000); // 1 Sekunde durchatmen, dann Morph
        }
    }

    update(dt, globalTime) {
        if (this.stage === 0) {
            this.y = this.anchorY - 20 + Math.sin(globalTime * 3) * 4;
        } 
        else if (this.stage === 1) {
            // Kaulquappe
            this.wanderTimer -= dt;
            if (this.wanderTimer <= 0) {
                this.wanderTarget.x = MathUtils.randomRange(100, CONSTANTS.PIXEL_W - 100);
                // Strikte Grenze: Darf nicht über Wasserlinie (45%) schwimmen. +5% Puffer
                this.wanderTarget.y = MathUtils.randomRange(CONSTANTS.PIXEL_H * 0.52, CONSTANTS.PIXEL_H - 60);
                this.wanderTimer = MathUtils.randomRange(2, 4);
            }

            let speedMultiplier = 15;
            
            if(GameEngine.State.current === 'BULLET_TIME' && GameEngine.MiniGames.targetEntity) {
                let e = GameEngine.MiniGames.targetEntity;
                this.wanderTarget.x = e.x; this.wanderTarget.y = e.y;
                speedMultiplier = 150; // Dash
            }

            let dx = this.wanderTarget.x - this.x; let dy = this.wanderTarget.y - this.y;
            let dist = Math.hypot(dx, dy);
            
            if (dist > 5) {
                this.vx += (dx / dist) * speedMultiplier * dt;
                this.vy += (dy / dist) * speedMultiplier * dt;
            }
            
            this.vx *= 0.90; this.vy *= 0.90;
            this.x += this.vx * 60 * dt; this.y += this.vy * 60 * dt;

            // Strikte Y-Sperre (Darf nicht aus Wasser fliegen)
            if (this.y < CONSTANTS.PIXEL_H * 0.48) {
                this.y = CONSTANTS.PIXEL_H * 0.48;
                this.vy = Math.max(0, this.vy); // Bounce down
            }

            // PERFEKTE INVERS-KINEMATIK (Schwanz bleibt hinten)
            let speed = Math.hypot(this.vx, this.vy);
            if (speed > 0.1) this.angle = Math.atan2(this.vy, this.vx); // Speichert Richtung, auch wenn stehenbleibend
            
            let headBackX = this.x - Math.cos(this.angle) * 14; 
            let headBackY = this.y - Math.sin(this.angle) * 14;
            
            this.tail[0] = { x: headBackX, y: headBackY };
            let segLen = 7;
            
            for(let i=1; i<this.tail.length; i++) {
                let prev = this.tail[i-1];
                let curr = this.tail[i];
                
                // Distanz und Winkel zum vorherigen Segment
                let tdx = curr.x - prev.x;
                let tdy = curr.y - prev.y;
                let tdist = Math.hypot(tdx, tdy);
                
                let dirX = tdx / tdist; let dirY = tdy / tdist;
                let segAngle = Math.atan2(dirY, dirX);
                
                // Wiggle einfügen
                segAngle += Math.sin(globalTime * 15 - i * 0.8) * (0.05 + speed * 0.03);
                
                // Zieht das Segment exakt in segLen Abstand hinterher!
                curr.x = prev.x + Math.cos(segAngle) * segLen;
                curr.y = prev.y + Math.sin(segAngle) * segLen;
            }
        }
        else if (this.stage === 2) {
            this.headX = this.x; this.headY = this.y - 30;

            if (this.tongue.active) {
                if (this.tongue.phase === 'out') {
                    this.tongue.progress += 10 * dt;
                    if (this.tongue.progress >= 1) {
                        this.tongue.progress = 1; this.tongue.phase = 'in';
                        let e = GameEngine.MiniGames.targetEntity;
                        if (e && e.active && MathUtils.distance(this.tongue.tx, this.tongue.ty, e.x, e.y) < 80) {
                            e.active = false; AudioEngine.playPop(); 
                            GameEngine.Particles.spawn(e.x, e.y, 'blood', 15);
                            this.addXP(50);
                            GameEngine.State.set('IDLE');
                        }
                    }
                } else {
                    this.tongue.progress -= 8 * dt;
                    if (this.tongue.progress <= 0) {
                        this.tongue.active = false;
                        if(GameEngine.State.current !== 'IDLE' && GameEngine.State.current !== 'EVOLVING') {
                            GameEngine.State.set('IDLE');
                            if(GameEngine.MiniGames.targetEntity) GameEngine.MiniGames.targetEntity.active = false;
                        }
                    }
                }
            }
        }
    }

    draw(ctx, globalTime) {
        if(this.stage === 0 || this.stage === 2) {
            ctx.fillStyle = '#0f172a'; ctx.beginPath(); ctx.ellipse(this.anchorX, this.anchorY + 30, 90, 25, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.ellipse(this.anchorX, this.anchorY + 20, 80, 20, 0, 0, Math.PI*2); ctx.fill();
        }

        if (this.stage === 0) {
            let eggGrad = ctx.createRadialGradient(this.x - 10, this.y - 10, 0, this.x, this.y, 35);
            eggGrad.addColorStop(0, 'rgba(186, 230, 253, 0.9)'); eggGrad.addColorStop(1, 'rgba(56, 189, 248, 0.4)');
            ctx.fillStyle = eggGrad;
            ctx.beginPath(); ctx.arc(this.x, this.y, 35 + Math.sin(globalTime*4)*3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#020617'; ctx.beginPath(); ctx.arc(this.x + Math.cos(globalTime*2)*5, this.y + Math.sin(globalTime*3)*5, 12, 0, Math.PI*2); ctx.fill();
        } 
        else if (this.stage === 1) {
            // Kaulquappe
            ctx.strokeStyle = 'rgba(52, 211, 153, 0.3)'; ctx.lineWidth = 14; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(this.tail[0].x, this.tail[0].y);
            for(let i=1; i<this.tail.length; i++) ctx.lineTo(this.tail[i].x, this.tail[i].y);
            ctx.stroke();
            
            ctx.strokeStyle = '#064e3b'; ctx.lineWidth = 5;
            ctx.beginPath(); ctx.moveTo(this.tail[0].x, this.tail[0].y);
            for(let i=1; i<this.tail.length; i++) ctx.lineTo(this.tail[i].x, this.tail[i].y);
            ctx.stroke();
            
            ctx.save(); ctx.translate(this.x, this.y); ctx.rotate(this.angle); // Nutzt den gespeicherten Winkel!
            ctx.fillStyle = '#10b981'; ctx.beginPath(); ctx.ellipse(0, 0, 18, 14, 0, 0, Math.PI*2); ctx.fill();
            
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(8, -8, 5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(8, 8, 5, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#020617'; ctx.beginPath(); ctx.arc(10, -8, 3, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(10, 8, 3, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#ffffff'; ctx.beginPath(); ctx.arc(11, -9, 1.5, 0, Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(11, 7, 1.5, 0, Math.PI*2); ctx.fill(); 
            ctx.restore();
        }
        else if (this.stage === 2) {
            let breath = Math.sin(globalTime * 3) * 2;
            
            ctx.fillStyle = '#064e3b';
            ctx.beginPath(); ctx.ellipse(this.x - 45, this.y + 10, 20, 30, -Math.PI/6, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(this.x + 45, this.y + 10, 20, 30, Math.PI/6, 0, Math.PI*2); ctx.fill();

            let bodyGrad = ctx.createRadialGradient(this.x, this.y - 10, 0, this.x, this.y, 60);
            bodyGrad.addColorStop(0, '#10b981'); bodyGrad.addColorStop(1, '#059669');
            ctx.fillStyle = bodyGrad; ctx.beginPath(); ctx.ellipse(this.x, this.y, 60, 45 + breath, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#a7f3d0'; ctx.beginPath(); ctx.ellipse(this.x, this.y + 15, 45, 30 + breath, 0, 0, Math.PI*2); ctx.fill();

            ctx.fillStyle = '#059669';
            ctx.beginPath(); ctx.ellipse(this.x - 35, this.y + 30, 10, 20, -Math.PI/8, 0, Math.PI*2); ctx.fill();
            ctx.beginPath(); ctx.ellipse(this.x + 35, this.y + 30, 10, 20, Math.PI/8, 0, Math.PI*2); ctx.fill();

            if (this.tongue.active) {
                let curX = MathUtils.lerp(this.headX, this.tongue.tx, this.tongue.progress);
                let curY = MathUtils.lerp(this.headY, this.tongue.ty, this.tongue.progress);
                ctx.strokeStyle = '#e11d48'; ctx.lineWidth = 12 * (1 - this.tongue.progress*0.5); ctx.lineCap = 'round';
                ctx.beginPath(); ctx.moveTo(this.headX, this.headY);
                let cpX = (this.headX + curX) / 2; let cpY = Math.min(this.headY, curY) - 50 * Math.sin(this.tongue.progress * Math.PI);
                ctx.quadraticCurveTo(cpX, cpY, curX, curY); ctx.stroke();
                ctx.fillStyle = '#f43f5e'; ctx.beginPath(); ctx.arc(curX, curY, 8, 0, Math.PI*2); ctx.fill();
            }

            ctx.fillStyle = '#059669'; ctx.beginPath(); ctx.ellipse(this.headX, this.headY, 50, 30, 0, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#020617'; ctx.beginPath(); ctx.arc(this.headX - 25, this.headY - 20, 15, 0, Math.PI*2); ctx.arc(this.headX + 25, this.headY - 20, 15, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fbbf24'; ctx.beginPath(); ctx.arc(this.headX - 25, this.headY - 20, 10, 0, Math.PI*2); ctx.arc(this.headX + 25, this.headY - 20, 10, 0, Math.PI*2); ctx.fill();
            ctx.fillStyle = '#000';
            
            let lX = 0, lY = 0;
            if(GameEngine.State.current === 'BULLET_TIME' && GameEngine.MiniGames.targetEntity) {
                let dirX = GameEngine.MiniGames.targetEntity.x - this.headX; let dirY = GameEngine.MiniGames.targetEntity.y - this.headY;
                let mag = Math.hypot(dirX, dirY); lX = (dirX/mag) * 4; lY = (dirY/mag) * 4;
            }
            ctx.fillRect(this.headX - 30 + lX, this.headY - 25 + lY, 10, 10); ctx.fillRect(this.headX + 20 + lX, this.headY - 25 + lY, 10, 10);
        }
    }
}

// --- MINIGAMES ---
const MiniGames = {
    targetBox: null, targetEntity: null, pressure: 0, startedPressing: false, bulletTimer: 0,
    
    start() {
        GameEngine.State.set('SQUEEZE');
        let cx = CONSTANTS.PIXEL_W / 2; let cy = CONSTANTS.PIXEL_H * 0.35;
        let st = GameEngine.Creature.stage;
        this.targetBox = { x: cx, y: cy, type: st === 0 ? 'crystal' : (st === 1 ? 'bubble' : 'vial') };
        this.pressure = 0; this.startedPressing = false;

        GameEngine.Camera.targetX = cx; GameEngine.Camera.targetY = cy; GameEngine.Camera.targetZoom = 1.6;
        
        // Prompt explizit einblenden
        const p = document.getElementById('cinematic-prompt');
        p.innerText = "BILDSCHIRM GEDRÜCKT HALTEN"; p.style.opacity = '1';
    },

    update(dt) {
        if (GameEngine.State.current === 'SQUEEZE') {
            if (GameEngine.Input.isDown) {
                this.startedPressing = true;
                this.pressure += 120 * dt; 
                GameEngine.Camera.shake(this.pressure * 0.08);
                document.getElementById('cinematic-prompt').style.opacity = '0';
                if (this.pressure >= 100) this.shatter();
            } else if (this.startedPressing) {
                this.pressure = Math.max(0, this.pressure - 80 * dt);
                if (this.pressure === 0) GameEngine.State.set('IDLE');
            }
        } 
        else if (GameEngine.State.current === 'BULLET_TIME') {
            this.bulletTimer += dt;
            if (this.bulletTimer > 6) { 
                GameEngine.State.set('IDLE');
                if (this.targetEntity) this.targetEntity.active = false;
            }

            if(this.targetEntity && this.targetEntity.active) {
                let e = this.targetEntity;
                e.x += e.vx * 60 * dt; e.y += e.vy * 60 * dt;
                
                // Konstantes, sanftes Sinken im Wasser
                if(e.type === 'food') {
                    if(e.y > CONSTANTS.PIXEL_H - 50) { e.y = CONSTANTS.PIXEL_H - 50; e.vy = 0; }
                }
                if(e.type === 'fly') {
                    if(e.x < 50 || e.x > CONSTANTS.PIXEL_W-50) e.vx *= -1;
                    if(e.y < 40) e.vy *= -1;
                }
                
                if(GameEngine.Creature.stage === 2) { GameEngine.Camera.targetX = e.x; GameEngine.Camera.targetY = e.y; }

                if(GameEngine.Creature.stage === 1) {
                    let dist = MathUtils.distance(GameEngine.Creature.x, GameEngine.Creature.y, e.x, e.y);
                    if(dist < 25) {
                        e.active = false; AudioEngine.playPop(); GameEngine.Particles.spawn(e.x, e.y, 'eat', 15);
                        GameEngine.Creature.addXP(40);
                        GameEngine.State.set('IDLE');
                    }
                }
            }
        }
    },

    shatter() {
        AudioEngine.playShatter(); GameEngine.Particles.spawn(this.targetBox.x, this.targetBox.y, 'glass', 50);
        GameEngine.Camera.shake(25); document.getElementById('cinematic-prompt').style.opacity = '0';
        
        let st = GameEngine.Creature.stage;
        this.bulletTimer = 0;
        
        if(st === 0) {
            GameEngine.Particles.spawn(this.targetBox.x, this.targetBox.y, 'magic', 40);
            GameEngine.Creature.addXP(25);
            GameEngine.State.set('IDLE');
        } 
        else if (st === 1) {
            this.targetEntity = { active: true, x: this.targetBox.x, y: this.targetBox.y, type: 'food', vx: 0, vy: 0.8 };
            GameEngine.State.set('BULLET_TIME'); 
            GameEngine.Camera.targetTimeScale = 0.45; GameEngine.Camera.targetZoom = 1.3;
            AudioEngine.playDash();
        }
        else if (st === 2) {
            this.targetEntity = { active: true, x: this.targetBox.x, y: this.targetBox.y, type: 'fly', vx: MathUtils.randomRange(-3, 3), vy: -1.0 };
            GameEngine.State.set('BULLET_TIME'); 
            GameEngine.Camera.targetTimeScale = 0.45; GameEngine.Camera.targetZoom = 1.8;
            
            const p = document.getElementById('cinematic-prompt');
            p.innerText = "ZIELEN & TIPPEN"; p.style.opacity = '1';
        }
        this.targetBox = null;
    },

    draw(ctx, globalTime) {
        if (this.targetBox) {
            let b = this.targetBox; let shake = (Math.random()-0.5) * (this.pressure/8);
            ctx.save(); ctx.translate(b.x + shake, b.y + Math.sin(globalTime*4)*4 + shake);
            
            if (b.type === 'vial') {
                ctx.fillStyle = `rgba(186, 230, 253, ${0.4 + this.pressure/150})`; ctx.strokeStyle = '#38bdf8'; ctx.lineWidth = 3;
                ctx.beginPath(); ctx.roundRect(-25, -35, 50, 70, 15); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#0ea5e9'; ctx.beginPath(); ctx.roundRect(-22, 0, 44, 32, 10); ctx.fill();
                ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(0, -10, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#b45309'; ctx.beginPath(); ctx.roundRect(-15, -45, 30, 10, 4); ctx.fill();
            } else if (b.type === 'bubble') {
                let glow = this.pressure / 100;
                let grad = ctx.createRadialGradient(-10, -10, 0, 0, 0, 35);
                grad.addColorStop(0, `rgba(255, 255, 255, ${0.6 + glow})`); grad.addColorStop(1, `rgba(52, 211, 153, ${0.3 + glow})`);
                ctx.fillStyle = grad; ctx.strokeStyle = '#6ee7b7'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.arc(0, 0, 35, 0, Math.PI*2); ctx.fill(); ctx.stroke();
                ctx.fillStyle = '#fef08a'; ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI*2); ctx.fill(); 
            } else {
                let glow = this.pressure / 100;
                ctx.fillStyle = `rgba(192, 132, 252, ${0.7 + glow})`; ctx.strokeStyle = '#d8b4fe'; ctx.lineWidth = 2;
                ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(25, 0); ctx.lineTo(0, 40); ctx.lineTo(-25, 0); ctx.closePath(); ctx.fill(); ctx.stroke();
                ctx.fillStyle = `rgba(255, 255, 255, ${0.3 + glow})`;
                ctx.beginPath(); ctx.moveTo(0, -40); ctx.lineTo(10, 0); ctx.lineTo(0, 40); ctx.closePath(); ctx.fill();
            }
            ctx.restore();
        }

        if (this.targetEntity && this.targetEntity.active) {
            let e = this.targetEntity;
            if (e.type === 'fly') {
                ctx.fillStyle = '#1e293b'; ctx.beginPath(); ctx.arc(e.x, e.y, 6, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#ef4444'; ctx.beginPath(); ctx.arc(e.x-2, e.y-2, 2, 0, Math.PI*2); ctx.arc(e.x+2, e.y-2, 2, 0, Math.PI*2); ctx.fill(); 
                let wingS = Math.sin(globalTime * 60) * 4; 
                ctx.fillStyle = 'rgba(255,255,255,0.8)';
                ctx.beginPath(); ctx.ellipse(e.x-6, e.y-4 + wingS, 6, 3, Math.PI/4, 0, Math.PI*2); ctx.fill();
                ctx.beginPath(); ctx.ellipse(e.x+6, e.y-4 + wingS, 6, 3, -Math.PI/4, 0, Math.PI*2); ctx.fill();
            } else {
                let foodGrad = ctx.createRadialGradient(e.x-2, e.y-2, 0, e.x, e.y, 8);
                foodGrad.addColorStop(0, '#fef08a'); foodGrad.addColorStop(1, '#eab308');
                ctx.fillStyle = foodGrad; ctx.beginPath(); ctx.arc(e.x, e.y, 8, 0, Math.PI*2); ctx.fill();
            }
        }
    }
};

// --- CORE ENGINE ---
const GameEngine = {
    Canvas: {}, Ctx: {}, LastTime: 0, GlobalTime: 0,
    Creature: new Creature(), Particles: new ParticleSystem(), MiniGames: MiniGames,

    // Morph Animations Logik
    evolveTimer: 0, 

    State: {
        current: 'IDLE',
        set(newState) {
            this.current = newState;
            const container = document.getElementById('game-container');
            container.classList.remove('mode-action', 'mode-evolving');
            
            if (newState === 'SQUEEZE' || newState === 'BULLET_TIME') container.classList.add('mode-action');
            else if (newState === 'EVOLVING') container.classList.add('mode-evolving');
            
            if (newState === 'IDLE') {
                GameEngine.Camera.targetTimeScale = 1.0;
                GameEngine.Camera.targetZoom = 1.0;
                GameEngine.Camera.targetX = GameEngine.Creature.anchorX;
                GameEngine.Camera.targetY = GameEngine.Creature.anchorY;
                document.getElementById('cinematic-prompt').style.opacity = '0';
            }
        }
    },

    Input: {
        isDown: false,
        init() {
            document.getElementById('btn-interact').addEventListener('pointerdown', (e) => {
                e.preventDefault(); e.stopPropagation(); 
                if(GameEngine.State.current === 'IDLE') GameEngine.MiniGames.start();
            });

            window.addEventListener('pointerdown', (e) => {
                if (e.target.closest('.action-btn')) return; 
                e.preventDefault(); this.isDown = true;
                
                if (GameEngine.State.current === 'BULLET_TIME' && GameEngine.Creature.stage === 2) {
                    const rect = GameEngine.Canvas.main.getBoundingClientRect();
                    let sx = e.clientX - rect.left; let sy = e.clientY - rect.top;
                    let worldPos = GameEngine.Camera.screenToWorld(sx, sy, rect.width, rect.height);
                    
                    let target = GameEngine.MiniGames.targetEntity;
                    if (target && target.active && MathUtils.distance(worldPos.x, worldPos.y, target.x, target.y) < 80) {
                        worldPos.x = target.x; worldPos.y = target.y;
                    }

                    GameEngine.Creature.tongue.active = true; GameEngine.Creature.tongue.progress = 0;
                    GameEngine.Creature.tongue.phase = 'out'; GameEngine.Creature.tongue.tx = worldPos.x; GameEngine.Creature.tongue.ty = worldPos.y;
                    
                    AudioEngine.playSplash(); document.getElementById('cinematic-prompt').style.opacity = '0';
                    GameEngine.Camera.targetTimeScale = 1.0; 
                }
            }, { passive: false });
            
            window.addEventListener('pointerup', () => { this.isDown = false; });
        }
    },

    UI: {
        update() {
            const st = GameEngine.Creature.stage;
            document.getElementById('ui-stage-name').innerText = st === 0 ? "Aether-Ei" : (st === 1 ? "Aether-Kaulquappe" : "Aether-Batrachos");
            document.getElementById('ui-lvl').innerText = `LVL ${st + 1}`;
            document.getElementById('btn-icon').innerText = st === 0 ? "✨" : (st === 1 ? "🫧" : "🪰");
            document.getElementById('btn-text').innerText = st === 0 ? "WÄRMEN" : (st === 1 ? "FÜTTERN" : "JAGD");
        }
    },

    init() {
        this.Canvas.main = document.getElementById('mainCanvas'); this.Ctx.main = this.Canvas.main.getContext('2d', { alpha: false });
        this.Canvas.shadow = document.getElementById('shadowCanvas'); this.Ctx.shadow = this.Canvas.shadow.getContext('2d', { alpha: true });
        this.Canvas.light = document.getElementById('lightCanvas'); this.Ctx.light = this.Canvas.light.getContext('2d', { alpha: true });
        
        this.Camera = new Camera();
        window.addEventListener('resize', () => this.resize()); this.resize();
        
        this.Input.init(); this.UI.update();
        this.LastTime = performance.now(); requestAnimationFrame((t) => this.loop(t));
    },

    resize() {
        const w = window.innerWidth; const h = window.innerHeight;
        ['main', 'shadow', 'light'].forEach(c => { this.Canvas[c].width = w; this.Canvas[c].height = h; this.Ctx[c].imageSmoothingEnabled = false; });
    },

    drawBackground(pCtx) {
        const hY = CONSTANTS.PIXEL_H * CONSTANTS.WATER_LINE;
        const bgGrad = pCtx.createLinearGradient(0, 0, 0, hY);
        bgGrad.addColorStop(0, '#020617'); bgGrad.addColorStop(1, '#0f172a');
        pCtx.fillStyle = bgGrad; pCtx.fillRect(0, 0, CONSTANTS.PIXEL_W, hY);

        const waterGrad = pCtx.createLinearGradient(0, hY, 0, CONSTANTS.PIXEL_H);
        waterGrad.addColorStop(0, '#083344'); waterGrad.addColorStop(1, '#020617');
        pCtx.fillStyle = waterGrad; pCtx.fillRect(0, hY, CONSTANTS.PIXEL_W, CONSTANTS.PIXEL_H - hY);

        pCtx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; pCtx.lineWidth = 2;
        for(let i=0; i<3; i++) {
            pCtx.beginPath();
            for(let x=0; x<CONSTANTS.PIXEL_W; x+=20) {
                let y = hY + 40 * i + Math.sin(x * 0.02 + this.GlobalTime * 2 + i) * 10;
                if(x===0) pCtx.moveTo(x, y); else pCtx.lineTo(x, y);
            }
            pCtx.stroke();
        }
    },

    drawScene() {
        const screenW = this.Canvas.main.width; const screenH = this.Canvas.main.height;
        const pCanvas = document.createElement('canvas'); pCanvas.width = CONSTANTS.PIXEL_W; pCanvas.height = CONSTANTS.PIXEL_H; const pCtx = pCanvas.getContext('2d');
        const sCanvas = document.createElement('canvas'); sCanvas.width = CONSTANTS.PIXEL_W; sCanvas.height = CONSTANTS.PIXEL_H; const sCtx = sCanvas.getContext('2d');
        const lCanvas = document.createElement('canvas'); lCanvas.width = CONSTANTS.PIXEL_W; lCanvas.height = CONSTANTS.PIXEL_H; const lCtx = lCanvas.getContext('2d');

        this.drawBackground(pCtx);
        this.Creature.draw(pCtx, this.GlobalTime);
        this.MiniGames.draw(pCtx, this.GlobalTime);
        this.Particles.draw(pCtx);

        // Schatten
        sCtx.fillStyle = 'rgba(2, 6, 23, 0.75)'; sCtx.fillRect(0, 0, CONSTANTS.PIXEL_W, CONSTANTS.PIXEL_H);
        sCtx.globalCompositeOperation = 'destination-out';
        let punchLight = (x, y, radius, alpha) => {
            let grad = sCtx.createRadialGradient(x, y, 0, x, y, radius);
            grad.addColorStop(0, `rgba(255,255,255,${alpha})`); grad.addColorStop(1, 'rgba(255,255,255,0)');
            sCtx.fillStyle = grad; sCtx.beginPath(); sCtx.arc(x, y, radius, 0, Math.PI*2); sCtx.fill();
        };
        punchLight(this.Creature.x, this.Creature.y, 120, 1.0);
        if (this.MiniGames.targetBox) punchLight(this.MiniGames.targetBox.x, this.MiniGames.targetBox.y, 100, 0.9);

        // Bloom Layer
        let addGlow = (x, y, radius, color) => {
            let grad = lCtx.createRadialGradient(x, y, 0, x, y, radius);
            grad.addColorStop(0, color); grad.addColorStop(1, 'rgba(0,0,0,0)');
            lCtx.fillStyle = grad; lCtx.beginPath(); lCtx.arc(x, y, radius, 0, Math.PI*2); lCtx.fill();
        };
        
        if (this.Creature.stage === 0) addGlow(this.Creature.x, this.Creature.y, 80, 'rgba(56, 189, 248, 0.4)');
        if (this.MiniGames.targetBox) addGlow(this.MiniGames.targetBox.x, this.MiniGames.targetBox.y, 100 + this.MiniGames.pressure, 'rgba(255, 255, 255, 0.3)');

        // AAA Morph Animation Bloom
        if (this.State.current === 'EVOLVING') {
            let intensity = Math.sin(Math.min(1, this.evolveTimer / 3.0) * Math.PI); // Pulse Kurve
            addGlow(this.Creature.x, this.Creature.y - 10, 250 * intensity, `rgba(186, 230, 253, ${intensity * 0.9})`);
            addGlow(this.Creature.x, this.Creature.y - 10, 100 * intensity, `rgba(255, 255, 255, ${intensity})`);
        }

        // Render auf Screen
        this.Ctx.main.fillStyle = '#000'; this.Ctx.main.fillRect(0, 0, screenW, screenH);
        this.Ctx.shadow.clearRect(0, 0, screenW, screenH); this.Ctx.light.clearRect(0, 0, screenW, screenH);

        this.Ctx.main.save(); this.Ctx.shadow.save(); this.Ctx.light.save();
        
        this.Camera.applyTransform(this.Ctx.main, screenW, screenH);
        this.Camera.applyTransform(this.Ctx.shadow, screenW, screenH);
        this.Camera.applyTransform(this.Ctx.light, screenW, screenH);

        this.Ctx.main.drawImage(pCanvas, 0, 0, CONSTANTS.PIXEL_W, CONSTANTS.PIXEL_H);
        this.Ctx.shadow.drawImage(sCanvas, 0, 0, CONSTANTS.PIXEL_W, CONSTANTS.PIXEL_H);
        this.Ctx.light.drawImage(lCanvas, 0, 0, CONSTANTS.PIXEL_W, CONSTANTS.PIXEL_H);

        this.Ctx.main.restore(); this.Ctx.shadow.restore(); this.Ctx.light.restore();
    },

    loop(time) {
        let dt = Math.min((time - this.LastTime) / 1000, 0.1); 
        this.LastTime = time; 
        
        let scaledDt = dt * this.Camera.timeScale;
        this.GlobalTime += scaledDt;

        this.Camera.update(dt); 

        // Morph Animations Logik Update
        if (this.State.current === 'EVOLVING') {
            this.evolveTimer += dt;
            this.Camera.shake(this.evolveTimer * 2); // Bebt immer stärker
            
            if(Math.random() < 0.2) this.Particles.spawn(0, 0, 'evolve', 2); // Spirale

            // Mitten in der Animation: Swap Model!
            if (this.evolveTimer > 1.5 && this.Creature.xp >= this.Creature.maxXp) {
                this.Creature.stage++; 
                this.Creature.xp = 0; 
                this.Creature.maxXp = this.Creature.stage === 1 ? 250 : 999;
                if(this.Creature.stage === 2) { this.Creature.x = this.Creature.anchorX; this.Creature.y = this.Creature.anchorY; }
                AudioEngine.playEvolveBoom();
                this.UI.update();
            }

            if (this.evolveTimer >= 3.0) {
                this.evolveTimer = 0;
                this.State.set('IDLE');
            }
        }

        this.Creature.update(scaledDt, this.GlobalTime);
        this.MiniGames.update(scaledDt);
        this.Particles.update(scaledDt, this.GlobalTime);

        this.drawScene();
        requestAnimationFrame((t) => this.loop(t));
    }
};

window.onload = () => { GameEngine.init(); };
</script>
