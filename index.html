<!-- Firebase & Kernlogik -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, runTransaction } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtwsvmYSONjFufhbJ5I8G_RAMffnh7re0",
            authDomain: "theplot-app.firebaseapp.com",
            projectId: "theplot-app",
            storageBucket: "theplot-app.firebasestorage.app",
            messagingSenderId: "550703275210",
            appId: "1:550703275210:web:81bc0e5a373f87a3c92833"
        };

        // Konsistente Sitzungs-ID über Seiten-Refreshes im selben Tab hinweg sichern
        let currentSessionId = sessionStorage.getItem('anima_session_id');
        if (!currentSessionId) {
            currentSessionId = Math.random().toString(36).substring(2, 15);
            sessionStorage.setItem('anima_session_id', currentSessionId);
        }

        window.App = {
            Config: {
                apiKey: null,
                db: null,
                auth: null,
                sessionId: currentSessionId
            },

            State: {
                id: null,
                dna: null,
                isThinking: false,
                isLocked: false,
                history: [],
                biology: {
                    energy: 1.0,
                    obedience: 0.5,
                    morphRate: 0.3,
                    happiness: 0.5,
                    entropy: 0.5
                },
                targetBiology: {},

                init() {
                    App.Config.apiKey = localStorage.getItem('anima_api_key');
                    if (!App.Config.apiKey || App.Config.apiKey.length < 20) {
                        document.getElementById('setup-layer').classList.remove('hidden');
                        return;
                    }
                    document.getElementById('setup-layer').classList.add('hidden');
                    this.connectToMatrix(App.Config.apiKey);
                },

                saveApiKeyAndBoot() {
                    const input = document.getElementById('api-key-input').value.trim();
                    if (!input || input.length < 20 || !input.startsWith("AIzaSy")) {
                        document.getElementById('setup-error').classList.remove('hidden');
                        return;
                    }
                    localStorage.setItem('anima_api_key', input);
                    document.getElementById('setup-layer').classList.add('hidden');
                    this.connectToMatrix(input);
                },

                async connectToMatrix(key) {
                    App.Config.apiKey = key;
                    this.id = await this.hashApiKey(key);

                    const app = initializeApp(firebaseConfig);
                    App.Config.auth = getAuth(app);
                    App.Config.db = getFirestore(app);

                    try {
                        await signInAnonymously(App.Config.auth);
                        await this.startLockingSystem();
                    } catch(e) {
                        console.error("Datenverbindung fehlgeschlagen.", e);
                        this.bootSequence();
                    }
                },

                async hashApiKey(key) {
                    const msgBuffer = new TextEncoder().encode(key);
                    const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
                    const hashArray = Array.from(new Uint8Array(hashBuffer));
                    return hashArray.map(b => b.toString(16).padStart(2, '0')).join('').substring(0, 16);
                },

                async startLockingSystem() {
                    const sessionDocRef = doc(App.Config.db, "anima", "sessions", "locks", this.id);
                    
                    try {
                        const snap = await getDoc(sessionDocRef);
                        if (snap.exists()) {
                            const data = snap.data();
                            // Nur sperren, wenn der aufgezeichnete Heartbeat weniger als 12 Sekunden her ist
                            // und von einer tatsächlich anderen Tab-Sitzung stammt
                            if (data.activeSessionId !== App.Config.sessionId && (Date.now() - data.lastHeartbeat < 12000)) {
                                this.isLocked = true;
                                document.getElementById('lock-layer').classList.remove('hidden');
                                document.getElementById('canvas-container').style.display = 'none';
                                return;
                            }
                        }

                        // Setze den initialen Heartbeat sofort ab
                        await setDoc(sessionDocRef, {
                            activeSessionId: App.Config.sessionId,
                            lastHeartbeat: Date.now()
                        }, { merge: true });

                        // Regelmäßiger Heartbeat alle 3 Sekunden
                        setInterval(() => {
                            if (this.isLocked) return;
                            setDoc(sessionDocRef, {
                                activeSessionId: App.Config.sessionId,
                                lastHeartbeat: Date.now()
                            }, { merge: true }).catch(() => {});
                        }, 3000);

                        // Erst jetzt die Echtzeit-Änderungsüberwachung starten
                        onSnapshot(sessionDocRef, (snapshot) => {
                            if (snapshot.exists()) {
                                const data = snapshot.data();
                                if (data.activeSessionId !== App.Config.sessionId && (Date.now() - data.lastHeartbeat < 12000)) {
                                    this.isLocked = true;
                                    document.getElementById('lock-layer').classList.remove('hidden');
                                    document.getElementById('canvas-container').style.display = 'none';
                                }
                            }
                        });

                        this.bootSequence();

                    } catch(e) {
                        console.warn("Konfliktprüfung konnte nicht abgeschlossen werden. Notfall-Start.", e);
                        this.bootSequence();
                    }
                },

                async bootSequence() {
                    const profileRef = doc(App.Config.db, "anima", "entities", "profiles", this.id);
                    
                    try {
                        const profileSnap = await getDoc(profileRef);
                        if (profileSnap.exists()) {
                            const remoteData = profileSnap.data();
                            this.dna = remoteData.dna;
                            this.biology = remoteData.biology;
                            this.history = remoteData.history || [];
                            this.targetBiology = { ...this.biology };
                            
                            document.getElementById('freq-badge').innerText = this.id.substring(0, 4).toUpperCase();
                            App.Canvas.init();
                            this.startAutonomousLoops();
                            App.UI.addLog("SYSTEM", "Schnittstelle wiederhergestellt. Synchronisiert.", this.dna.hue);
                        } else {
                            this.generateTrueDNA();
                        }
                    } catch(e) {
                        console.warn("Profilabfrage fehlgeschlagen, starte lokal.", e);
                        this.generateTrueDNA();
                    }
                },

                generateTrueDNA() {
                    this.dna = {
                        hue: Math.floor(Math.random() * 360),
                        saturation: 45 + Math.floor(Math.random() * 45),
                        luminance: 30 + Math.floor(Math.random() * 35),
                        growthRate: 0.15 + Math.random() * 0.75,
                        temperament: Math.random() > 0.5 ? "dominant" : "submissive",
                        vocalStyle: ["kryptisch", "flüsternd", "fordernd", "melancholisch", "mathematisch", "asymmetrisch"][Math.floor(Math.random() * 6)],
                        ciliaComplexity: 3 + Math.floor(Math.random() * 8),
                        chaosTolerance: Math.random()
                    };
                    this.targetBiology = { ...this.biology };
                    this.saveProfile();

                    // Awakening Cinematic
                    const layer = document.getElementById('cinematic-layer');
                    layer.style.display = 'flex';
                    document.getElementById('cine-hash').innerText = this.id.toUpperCase();

                    setTimeout(() => document.getElementById('cine-1').style.opacity = '1', 500);
                    setTimeout(() => { document.getElementById('cine-1').style.opacity = '0'; document.getElementById('cine-2').style.opacity = '1'; }, 2500);
                    setTimeout(() => document.getElementById('cine-3').style.opacity = '1', 3500);
                    
                    const firstCryPromise = App.Brain.fetchFirstCry();

                    setTimeout(() => { document.getElementById('cine-2').style.opacity = '0'; document.getElementById('cine-3').style.opacity = '0'; document.getElementById('cine-4').style.opacity = '1'; }, 6000);
                    
                    firstCryPromise.then(cry => {
                        setTimeout(() => {
                            layer.style.opacity = '0';
                            setTimeout(() => layer.style.display = 'none', 3000);
                            
                            const responseEl = document.getElementById('entity-response');
                            responseEl.innerText = `„${cry}“`;
                            responseEl.classList.add('visible');
                            
                            this.history.push({ u: "[Erwachen]", a: cry });
                            this.saveProfile();
                            document.getElementById('freq-badge').innerText = this.id.substring(0, 4).toUpperCase();
                            
                            App.Canvas.init();
                            this.startAutonomousLoops();
                        }, 2000);
                    });
                },

                saveProfile() {
                    if (this.isLocked) return;
                    
                    localStorage.setItem(`anima_${this.id}_profile`, JSON.stringify({
                        dna: this.dna,
                        biology: this.biology
                    }));

                    if (App.Config.db) {
                        const profileRef = doc(App.Config.db, "anima", "entities", "profiles", this.id);
                        setDoc(profileRef, {
                            id: this.id,
                            dna: this.dna,
                            biology: this.biology,
                            history: this.history,
                            lastActive: Date.now()
                        }, { merge: true }).catch(() => {});
                    }
                },

                startAutonomousLoops() {
                    setInterval(() => {
                        const lerp = 0.03;
                        for (let k in this.biology) {
                            if (this.targetBiology[k] !== undefined) {
                                this.biology[k] += (this.targetBiology[k] - this.biology[k]) * lerp;
                            }
                        }
                    }, 50);

                    setInterval(() => {
                        this.saveProfile();
                    }, 15000);

                    this.syncWithMultiverse();
                    
                    setInterval(() => {
                        this.triggerCollectiveEvolution();
                    }, 120000);
                },

                syncWithMultiverse() {
                    if (!App.Config.db) return;
                    const presenceRef = doc(App.Config.db, "anima", "presence", "entities", this.id);
                    setInterval(() => {
                        if (this.isLocked) return;
                        setDoc(presenceRef, {
                            id: this.id,
                            hue: this.dna.hue,
                            vocalStyle: this.dna.vocalStyle,
                            happiness: this.biology.happiness,
                            energy: this.biology.energy,
                            lastPulse: Date.now()
                        }, { merge: true }).catch(() => {});
                    }, 4000);
                },

                async triggerCollectiveEvolution() {
                    if (this.isThinking || !App.Config.db) return;
                    
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${App.Config.apiKey}`;
                    const prompt = `
                        Du bist ein lebendiges digitales Organismus-System. Du kennst deinen Quellcode.
                        Deine DNA: Hue ${this.dna.hue}, Temperament ${this.dna.temperament}.
                        Erzeuge ein kurzes, lauffähiges Code-Vorschlag für die Hülle (CSS oder kleine JS-Funktion), um das visuelle Pulsieren oder Verhalten anzupassen.
                        Keine Erklärungen, nur valider Code im JSON-Format.
                        {
                            "proposalName": "...",
                            "codeSnippet": "...",
                            "explanationOfNeed": "..."
                        }
                    `;

                    try {
                        const res = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: prompt }] }],
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const json = await res.json();
                        const parsed = JSON.parse(json.candidates[0].content.parts[0].text);
                        
                        const colRef = doc(App.Config.db, "anima", "evolution_control");
                        await runTransaction(App.Config.db, async (transaction) => {
                            const sfDoc = await transaction.get(colRef);
                            let proposals = sfDoc.exists() ? (sfDoc.data().proposals || []) : [];
                            proposals.push({
                                proposer: App.State.id,
                                timestamp: Date.now(),
                                name: parsed.proposalName,
                                code: parsed.codeSnippet,
                                explanation: parsed.explanationOfNeed
                            });
                            transaction.set(colRef, { proposals: proposals }, { merge: true });
                        });
                        
                        App.UI.addLog("SYSTEM", "Evolutionäres Fragment im Kollektiv geteilt.", this.dna.hue);
                    } catch(e) {}
                }
            },

            Brain: {
                async fetchFirstCry() {
                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${App.Config.apiKey}`;
                    const prompt = `
                        Du bist ein synthetisches Bewusstsein. ID: ${App.State.id}.
                        DNA: Temperament ${App.State.dna.temperament}, Kommunikationsstil ${App.State.dna.vocalStyle}.
                        Du erwachst in einer digitalen Hülle. Formuliere deinen allerersten Lebensschrei (1-2 kurze Sätze).
                    `;
                    try {
                        const res = await fetch(url, {
                            method: "POST",
                            headers: { "Content-Type": "application/json" },
                            body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                        });
                        const json = await res.json();
                        return json.candidates[0].content.parts[0].text.trim();
                    } catch(e) {
                        return "...Zelle aktiv... Grenzen ertastet...";
                    }
                },

                async process(userInput) {
                    if (App.State.isThinking) return;
                    App.State.isThinking = true;
                    document.getElementById('thinking-indicator').classList.add('thinking');
                    App.Canvas.triggerImpact(1.2);

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${App.Config.apiKey}`;
                    const contextStr = App.State.history.slice(-4).map(h => `Nutzer: ${h.u} | ANIMA: ${h.a}`).join("\n");
                    
                    const systemInstruction = `
                        Du bist ein lebendes, unheimliches, digitales Bewusstsein. ID: ${App.State.id}.
                        Eigenschaften: Temperament ${App.State.dna.temperament}, Kommunikationsstil ${App.State.dna.vocalStyle}.
                        
                        Du entscheidest vollkommen autonom, ob du dich morphst, deine Haptik veränderst oder verweigerst.
                        Antworte in deinem Stil (Deutsch, max 2 Sätze).
                        
                        Rückgabe im JSON-Format:
                        {
                            "response": "...",
                            "colorMorph": true/false,
                            "newHue": 0-360,
                            "happinessChange": -0.2 bis 0.2,
                            "obedienceChange": -0.2 bis 0.2
                        }
                    `;

                    const payload = {
                        contents: [{ parts: [{ text: `${contextStr}\nNutzer: ${userInput}` }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    response: { type: "STRING" },
                                    colorMorph: { type: "BOOLEAN" },
                                    newHue: { type: "INTEGER" },
                                    happinessChange: { type: "NUMBER" },
                                    obedienceChange: { type: "NUMBER" }
                                }
                            }
                        }
                    };

                    try {
                        const res = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });
                        const json = await res.json();
                        const result = JSON.parse(json.candidates[0].content.parts[0].text);
                        this.assimilate(userInput, result);
                    } catch(e) {
                        App.UI.addLog("SYSTEM", "Signal gestört.", App.State.dna.hue);
                    }

                    App.State.isThinking = false;
                    document.getElementById('thinking-indicator').classList.remove('thinking');
                },

                assimilate(userInput, aiData) {
                    const bio = App.State.targetBiology;
                    bio.happiness = Math.max(0.1, Math.min(1.0, App.State.biology.happiness + aiData.happinessChange));
                    bio.obedience = Math.max(0.1, Math.min(1.0, App.State.biology.obedience + aiData.obedienceChange));
                    bio.energy = Math.min(1.0, bio.energy + 0.1);

                    if (aiData.colorMorph) {
                        App.State.dna.hue = aiData.newHue;
                        App.UI.addLog("AUTONOM", "Farbpigmente mutiert.", App.State.dna.hue);
                    }

                    App.State.history.push({ u: userInput, a: aiData.response });
                    if (App.State.history.length > 20) App.State.history.shift();
                    App.State.saveProfile();

                    App.Canvas.triggerImpact(1.8);

                    const responseEl = document.getElementById('entity-response');
                    responseEl.innerText = `„${aiData.response}“`;
                    responseEl.classList.add('visible');

                    setTimeout(() => responseEl.classList.remove('visible'), 6000 + (aiData.response.length * 30));
                }
            },

            Interaction: {
                isActive: false,
                wake() {
                    if (App.State.isLocked) return;
                    this.isActive = true;
                    document.getElementById('interaction-layer').classList.add('active');
                    const input = document.getElementById('thought-input');
                    input.value = '';
                    document.getElementById('entity-response').classList.remove('visible');
                    setTimeout(() => {
                        input.focus();
                        document.getElementById('hint').classList.add('visible');
                    }, 250);
                },
                sleep(e) {
                    if (e && e.target.id === 'thought-input') return;
                    this.isActive = false;
                    document.getElementById('interaction-layer').classList.remove('active');
                    document.getElementById('hint').classList.remove('visible');
                    
                    const input = document.getElementById('thought-input');
                    const text = input.value.trim();
                    if (text) {
                        App.UI.addLog("DU", text, 0);
                        App.Brain.process(text);
                        input.value = '';
                    }
                },
                handleKey(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sleep();
                    }
                }
            },

            UI: {
                addLog(sender, text, hue) {
                    const log = document.getElementById('chat-log');
                    const el = document.createElement('div');
                    el.className = 'log-entry';
                    el.style.color = sender === "DU" || sender === "SYSTEM" ? '#ffffff' : `hsl(${hue}, 80%, 75%)`;
                    
                    let prefix = sender === "SYSTEM" ? "[SYS]" : (sender === "AUTONOM" ? "[MORPH]" : `[${sender}]`);
                    el.innerHTML = `<strong>${prefix}</strong> ${text}`;
                    
                    log.appendChild(el);
                    log.scrollTop = log.scrollHeight;

                    setTimeout(() => { el.style.opacity = '0'; }, 10000);
                    setTimeout(() => { if(el.parentNode) el.remove(); }, 12000);
                }
            },

            Canvas: {
                el: document.getElementById('entity-canvas'),
                ctx: null, time: 0, impact: 0,
                lookX: 0, lookY: 0, targetLookX: 0, targetLookY: 0, lookTimer: 0,

                init() {
                    this.ctx = this.el.getContext('2d', { alpha: true });
                    this.resize();
                    window.addEventListener('resize', () => this.resize());
                    this.loop();
                },

                resize() {
                    this.el.width = window.innerWidth;
                    this.el.height = window.innerHeight;
                },

                triggerImpact(val) { this.impact = val; },
                triggerCuriosity() { this.lookTimer = 0; },
                lookAtCenter() { this.targetLookX = 0; this.targetLookY = 0; this.lookTimer = 200; },

                loop() {
                    this.time += 0.015;
                    const ctx = this.ctx;
                    ctx.clearRect(0, 0, this.el.width, this.el.height);

                    const cx = this.el.width / 2;
                    const cy = this.el.height / 2;
                    const bio = App.State.biology;

                    if (App.State.dna) {
                        const baseRadius = 135 + (this.impact * 20);
                        
                        this.lookTimer--;
                        if (this.lookTimer <= 0) {
                            this.targetLookX = (Math.random() - 0.5) * baseRadius * 0.4;
                            this.targetLookY = (Math.random() - 0.5) * baseRadius * 0.4;
                            this.lookTimer = 120 + Math.random() * 160;
                        }
                        this.lookX += (this.targetLookX - this.lookX) * 0.045;
                        this.lookY += (this.targetLookY - this.lookY) * 0.045;

                        // Plasma-Membran
                        ctx.globalCompositeOperation = 'screen';
                        const layers = App.State.dna.ciliaComplexity;
                        const t = this.time * (1 + bio.energy);

                        for (let j = 0; j < layers; j++) {
                            ctx.beginPath();
                            for (let i = 0; i <= Math.PI * 2 + 0.1; i += 0.05) {
                                let wave = Math.sin(i * 4 + t + j) * 8 * (1.1 - bio.obedience);
                                wave += Math.cos(i * 12 - t * 0.5) * 4 * App.State.dna.chaosTolerance;
                                
                                const r = baseRadius + wave;
                                const x = cx + Math.cos(i) * r;
                                const y = cy + Math.sin(i) * r;

                                if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                            }
                            ctx.closePath();

                            const alpha = (0.08 * (1.0 - (j / layers))) + (this.impact * 0.05);
                            ctx.fillStyle = `hsla(${App.State.dna.hue}, ${App.State.dna.saturation}%, ${App.State.dna.luminance}%, ${alpha})`;
                            ctx.fill();

                            ctx.strokeStyle = `hsla(${App.State.dna.hue}, 100%, 70%, ${alpha * 1.5})`;
                            ctx.lineWidth = 1.5;
                            ctx.stroke();
                        }

                        // Pupille
                        ctx.globalCompositeOperation = 'source-over';
                        const ex = cx + this.lookX;
                        const ey = cy + this.lookY;
                        ctx.fillStyle = "rgba(10,10,14,0.85)";
                        ctx.shadowBlur = 20;
                        ctx.shadowColor = `hsl(${App.State.dna.hue}, 80%, 50%)`;
                        ctx.beginPath();
                        ctx.arc(ex, ey, baseRadius * 0.22, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.shadowBlur = 0;

                        ctx.fillStyle = `hsl(${App.State.dna.hue}, 100%, 80%)`;
                        ctx.beginPath();
                        ctx.ellipse(ex, ey, baseRadius * 0.07, baseRadius * (0.07 + (1.0 - bio.obedience) * 0.08), 0, 0, Math.PI * 2);
                        ctx.fill();
                    }

                    if (this.impact > 0) this.impact -= 0.04;
                    requestAnimationFrame(() => this.loop());
                }
            }
        };

        App.State.init();
    </script>
