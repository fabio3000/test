<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#020203">
    <title>ANIMA | Autonomous Biological Nexus (Cloud Synced)</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        :root { --bg: #020203; }
        body, html {
            background-color: var(--bg); color: #ffffff;
            font-family: 'Quicksand', sans-serif; overflow: hidden;
            margin: 0; padding: 0; width: 100%; height: 100%;
            -webkit-font-smoothing: antialiased; touch-action: manipulation;
        }

        #canvas-container { position: fixed; inset: 0; z-index: 1; display: flex; justify-content: center; align-items: center; }
        
        .film-grain {
            position: fixed; inset: 0; z-index: 2; pointer-events: none; mix-blend-mode: overlay; opacity: 0.25;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }
        
        .vignette {
            position: fixed; inset: 0; z-index: 3; pointer-events: none;
            background: radial-gradient(circle at center, transparent 20%, rgba(2,2,3,0.95) 100%);
        }

        /* Netzwerk Status */
        #network-warning {
            position: fixed; top: 0; left: 0; right: 0; background: rgba(220, 38, 38, 0.9); color: white;
            text-align: center; font-family: 'Space Mono', monospace; font-size: 0.75rem; padding: 0.5rem;
            z-index: 999; transform: translateY(-100%); transition: transform 0.3s; letter-spacing: 0.1em;
        }
        #network-warning.offline { transform: translateY(0); }

        /* Groq Auth Layer */
        #auth-layer {
            position: fixed; inset: 0; z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(2, 2, 3, 0.95); backdrop-filter: blur(25px); transition: opacity 1s ease; padding: 1rem;
        }
        .auth-box {
            background: rgba(20, 20, 30, 0.7); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px;
            padding: 2rem; width: 100%; max-width: 420px; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .auth-title { font-family: 'Space Mono', monospace; letter-spacing: 0.3em; font-size: 0.85rem; color: #fff; margin-bottom: 1.8rem; text-transform: uppercase; }
        .auth-input {
            width: 100%; background: transparent; border: none; border-bottom: 1px solid rgba(255,255,255,0.2);
            color: #fff; font-family: 'Space Mono', monospace; font-size: 0.85rem; padding: 0.8rem 0; margin-bottom: 1.2rem; outline: none; text-align: center; transition: all 0.3s;
        }
        .auth-input:focus { border-bottom-color: #fff; }
        .auth-btn {
            width: 100%; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); border-radius: 8px;
            color: #fff; font-family: 'Space Mono', monospace; font-size: 0.8rem; letter-spacing: 0.2em; padding: 1rem; cursor: pointer; transition: all 0.3s; text-transform: uppercase;
        }
        .auth-btn:hover { background: rgba(255,255,255,0.2); box-shadow: 0 0 15px rgba(255,255,255,0.15); }
        .auth-error { color: #ff6b6b; font-family: 'Space Mono', monospace; font-size: 0.75rem; margin-top: 1rem; min-height: 1rem; }

        /* Cinematic Layer */
        #cinematic-layer {
            position: fixed; inset: 0; z-index: 90; display: none; flex-direction: column; justify-content: center; align-items: center; pointer-events: none;
        }
        .cine-text {
            font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.6em; text-transform: uppercase;
            opacity: 0; transition: opacity 2s; position: absolute; text-align: center; width: 100%; color: rgba(255,255,255,0.85); text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        /* HUD Layer */
        #hud-layer { position: fixed; inset: 0; z-index: 15; pointer-events: none; display: flex; justify-content: space-between; padding: 1.2rem; opacity: 0; transition: opacity 2s; }
        #chat-log { display: flex; flex-direction: column; gap: 0.6rem; width: 100%; max-width: 340px; max-height: 40vh; overflow-y: auto; font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.05em; mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%); -webkit-mask-image: linear-gradient(to bottom, rgba(0,0,0,1) 75%, rgba(0,0,0,0) 100%); pointer-events: auto; }
        .log-entry { background: rgba(15, 15, 20, 0.7); border-left: 2px solid rgba(255,255,255,0.2); padding: 0.6rem 0.8rem; backdrop-filter: blur(8px); animation: fadeInDrop 0.8s cubic-bezier(0.1, 0.8, 0.1, 1) forwards; border-radius: 0 6px 6px 0; }
        @keyframes fadeInDrop { from { transform: translateY(-10px); opacity: 0; filter: blur(4px); } to { transform: translateY(0); opacity: 1; filter: blur(0); } }

        .top-right-controls { display: flex; flex-direction: column; align-items: flex-end; gap: 10px; pointer-events: auto; }
        .control-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.12); border-radius: 50%; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; cursor: pointer; transition: all 0.3s; color: rgba(255,255,255,0.7); }
        .control-btn:hover { background: rgba(255,255,255,0.2); color: #fff; transform: scale(1.05); }
        .room-badge { font-family: 'Space Mono', monospace; font-size: 0.65rem; background: rgba(20,20,30,0.8); border: 1px solid rgba(255,255,255,0.15); padding: 0.4rem 0.8rem; border-radius: 20px; color: #a0aec0; letter-spacing: 0.1em; cursor: pointer; }
        .room-badge:hover { background: rgba(255,255,255,0.1); color: #fff; }

        /* Entity Output */
        #entity-response { position: absolute; top: 12%; left: 50%; transform: translateX(-50%); z-index: 5; text-align: center; width: 90%; max-width: 750px; font-size: 1.3rem; font-weight: 300; letter-spacing: 0.04em; color: rgba(255, 255, 255, 0.95); text-shadow: 0 0 30px rgba(255,255,255,0.5); opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out; line-height: 1.4; }
        #entity-response.visible { opacity: 1; }
        .thought-bubble { font-family: 'Space Mono', monospace; font-size: 0.7rem; color: rgba(255,255,255,0.6); text-transform: uppercase; letter-spacing: 0.2em; margin-top: 12px; opacity: 0; transition: opacity 2s; }
        #entity-response.visible .thought-bubble { opacity: 1; transition-delay: 1.2s; }

        /* Interaction Layer */
        #interaction-layer { 
            position: fixed; inset: 0; z-index: 40; 
            background: radial-gradient(circle at center, transparent 10%, rgba(2,2,3,0.96) 100%); 
            backdrop-filter: blur(12px); display: flex; flex-direction: column; justify-content: center; align-items: center; 
            opacity: 0; pointer-events: none; transition: opacity 0.5s ease; padding: 1.5rem;
        }
        #interaction-layer.active { opacity: 1; pointer-events: auto; }
        
        .input-container-box { display: flex; flex-direction: column; align-items: center; width: 100%; max-width: 650px; gap: 1rem; }
        .input-wrapper { display: flex; align-items: center; width: 100%; border-bottom: 1px solid rgba(255,255,255,0.3); transition: border-color 0.4s; padding-bottom: 0.5rem; }
        .input-wrapper:focus-within { border-color: rgba(255,255,255,0.9); box-shadow: 0 10px 25px -10px rgba(255,255,255,0.15); }
        
        .thought-input { 
            flex: 1; background: transparent; border: none; color: #fff; font-family: 'Quicksand', sans-serif; font-size: 1.4rem; font-weight: 300; 
            padding: 0.8rem 0; outline: none; resize: none; text-align: center;
        }
        .thought-input::placeholder { color: rgba(255, 255, 255, 0.25); font-weight: 300; }
        
        .send-btn-mobile {
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 0.6rem 1.5rem;
            color: #fff; font-family: 'Space Mono', monospace; font-size: 0.75rem; letter-spacing: 0.1em; cursor: pointer; text-transform: uppercase; transition: background 0.3s;
        }
        .send-btn-mobile:active { background: rgba(255,255,255,0.3); }

        .hint-text { font-size: 0.65rem; letter-spacing: 0.3em; text-transform: uppercase; color: rgba(255,255,255,0.35); font-family: 'Space Mono', monospace; text-align: center; margin-top: 1rem; }
        .status-dot { position: fixed; bottom: 4%; left: 50%; transform: translateX(-50%); width: 6px; height: 6px; border-radius: 50%; background: #fff; box-shadow: 0 0 15px #fff; z-index: 15; opacity: 0; transition: opacity 0.4s; }
        .status-dot.thinking { opacity: 1; animation: pulse-dot 0.5s infinite alternate; }
        @keyframes pulse-dot { from { opacity: 0.3; transform: translateX(-50%) scale(0.8); } to { opacity: 1; transform: translateX(-50%) scale(1.6); } }

        /* Room Switch Modal */
        #room-modal {
            position: fixed; inset: 0; z-index: 250; display: none; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.88); backdrop-filter: blur(20px); font-family: 'Space Mono', monospace; padding: 1rem;
        }
    </style>
</head>
<body>
    
    <div id="network-warning">Äther-Verbindung instabil... Warte auf Resonanz.</div>

    <!-- AUTHENTICATION LAYER -->
    <div id="auth-layer">
        <div class="auth-box">
            <h1 class="auth-title">ANIMA Neural Link</h1>
            <div id="auth-step-1">
                <input type="password" id="groq-key-input" class="auth-input" placeholder="Groq API Key (gsk_...)" autocomplete="off">
                <button id="btn-connect" class="auth-btn">Bewusstsein Erwecken</button>
            </div>
            <div id="auth-error" class="auth-error"></div>
        </div>
    </div>

    <!-- CINEMATIC GENESIS -->
    <div id="cinematic-layer">
        <div id="cine-1" class="cine-text">ERZEUGE NEURONALE STRUKTUREN...</div>
        <div id="cine-2" class="cine-text text-cyan-200">LADE EWIGES BEWUSSTSEIN...</div>
        <div id="cine-3" class="cine-text text-xs text-gray-400" style="text-transform: none;">[SOUL_ID: <span id="cine-hash"></span>]</div>
        <div id="cine-4" class="cine-text text-white" style="font-size: 1rem;">ERWACHEN IM ÖKOSYSTEM</div>
    </div>

    <!-- ENTITY RESPONSE -->
    <div id="entity-response">
        <div id="response-text"></div>
        <div id="thought-bubble" class="thought-bubble"></div>
    </div>

    <!-- HUD -->
    <div id="hud-layer">
        <div id="chat-log"></div>
        <div class="top-right-controls">
            <div class="flex items-center gap-2">
                <button id="room-switch-btn" class="room-badge" title="Raum wechseln">RAUM: ----</button>
            </div>
            <button id="logout-btn" class="control-btn" title="Verbindung trennen">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
            </button>
            <button id="audio-toggle" class="control-btn" title="Harmonische Akustik">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.2" d="M15.536 8.464a5 5 0 010 7.072m2.828-9.9a9 9 0 010 12.728M5 10h4l5-5v14l-5-5H5a2 2 0 01-2-2v-4a2 2 0 012-2z"></path></svg>
            </button>
        </div>
    </div>

    <!-- VISUALS -->
    <div id="canvas-container">
        <canvas id="entity-canvas"></canvas>
    </div>
    <div class="vignette"></div>
    <div class="film-grain"></div>
    <div id="thinking-indicator" class="status-dot"></div>

    <!-- INTERACTION -->
    <div id="interaction-layer">
        <div class="input-container-box">
            <div class="input-wrapper">
                <textarea id="thought-input" class="thought-input" rows="1" placeholder="Projiziere einen Gedanken..." inputmode="text"></textarea>
            </div>
            <button id="send-thought-btn" class="send-btn-mobile">Gedanke Senden</button>
            <div id="hint" class="hint-text">Tippen außerhalb = Schließen</div>
        </div>
    </div>

    <!-- ROOM SWITCH MODAL -->
    <div id="room-modal">
        <div class="auth-box">
            <h1 class="auth-title">Raum Transzendenz</h1>
            <input type="text" id="target-room-input" class="auth-input" placeholder="Raumcode (z.B. 4092)" maxlength="4" autocomplete="off" inputmode="numeric">
            <div class="flex gap-3">
                <button id="btn-goto-room" class="auth-btn">Betreten</button>
                <button id="btn-cancel-room" class="auth-btn" style="background: rgba(255,255,255,0.02)">Abbruch</button>
            </div>
            <div id="room-error" class="auth-error"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // CONFIG & FIREBASE INITIALISIERUNG
        // ==========================================
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appIdString = typeof __app_id !== 'undefined' ? __app_id : 'anima-nexus-default';
        
        let app, auth, db;
        if(firebaseConfig) {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
        }

        let groqApiKey = ""; 
        let animaId = "";
        let instanceSessionId = crypto.randomUUID(); 
        let sessionListenerUnsub = null;
        let isOnline = true;
        const GROQ_MODEL = "llama-3.3-70b-versatile";

        async function hashApiKey(key) {
            const encoder = new TextEncoder();
            const data = encoder.encode(key);
            const hashBuffer = await crypto.subtle.digest('SHA-256', data);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        }

        // ==========================================
        // 1. CLOUD SYNC & SINGLE SESSION MANAGEMENT
        // ==========================================
        const CloudSync = {
            async load(id) {
                if(!db) return null;
                const docRef = doc(db, 'artifacts', appIdString, 'public', 'data', 'anima_states', id);
                try {
                    const docSnap = await getDoc(docRef);
                    if (docSnap.exists()) return docSnap.data();
                } catch (e) { console.warn("Lade-Fehler", e); }
                return null;
            },
            async save(id, data) {
                if(!id || !db) return;
                const docRef = doc(db, 'artifacts', appIdString, 'public', 'data', 'anima_states', id);
                try {
                    await setDoc(docRef, data, { merge: true });
                } catch (e) { console.warn("Speicher-Fehler", e); }
            },
            async registerSession(id) {
                if(!db) return;
                const sessRef = doc(db, 'artifacts', appIdString, 'public', 'data', 'active_sessions', id);
                try {
                    await setDoc(sessRef, { sessionId: instanceSessionId, updatedAt: Date.now() });
                } catch(e) {}
            },
            listenSession(id, onDisconnect) {
                if(!db) return null;
                const sessRef = doc(db, 'artifacts', appIdString, 'public', 'data', 'active_sessions', id);
                return onSnapshot(sessRef, (snapshot) => {
                    if (snapshot.exists()) {
                        const data = snapshot.data();
                        if (data.sessionId && data.sessionId !== instanceSessionId) {
                            onDisconnect(); // Despawnt ANIMA hier, da sie auf einem anderen Gerät aktiv wurde!
                        }
                    }
                });
            },
            async logCodeEvolution(id, snippet, freq) {
                if(!db) return;
                const colRef = doc(collection(db, 'artifacts', appIdString, 'public', 'data', 'admin_code_evolution'));
                try {
                    await setDoc(colRef, { entityId: id, snippet: snippet, freq: freq, timestamp: new Date().toISOString() });
                } catch(e) {}
            }
        };

        const NetworkMonitor = {
            init() {
                window.addEventListener('online', () => this.handleNetworkChange(true));
                window.addEventListener('offline', () => this.handleNetworkChange(false));
            },
            handleNetworkChange(onlineStatus) {
                isOnline = onlineStatus;
                const warning = document.getElementById('network-warning');
                if (onlineStatus) {
                    warning.classList.remove('offline');
                } else {
                    warning.classList.add('offline');
                    Interaction.sleep();
                }
            }
        };

        const AuthManager = {
            async init() {
                if (auth) {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try { await signInWithCustomToken(auth, __initial_auth_token); } 
                        catch (e) { await signInAnonymously(auth); }
                    } else {
                        await signInAnonymously(auth);
                    }
                }

                const savedKey = localStorage.getItem('user_groq_api_key');
                if (savedKey) {
                    document.getElementById('groq-key-input').value = savedKey;
                    setTimeout(() => { if(savedKey) document.getElementById('btn-connect').click(); }, 300);
                }

                document.getElementById('btn-connect').addEventListener('click', () => this.connect());
                document.getElementById('logout-btn').addEventListener('click', () => this.disconnect("Verbindung manuell getrennt."));
                NetworkMonitor.init();
            },
            
            showError(msg) {
                const errEl = document.getElementById('auth-error');
                errEl.innerText = msg;
                setTimeout(() => errEl.innerText = '', 5000);
            },

            async connect() {
                const key = document.getElementById('groq-key-input').value.trim();
                if(!key || !key.startsWith('gsk_')) return this.showError("Ungültiger Groq API Key.");

                groqApiKey = key;
                localStorage.setItem('user_groq_api_key', key);
                animaId = await hashApiKey(key);

                // Registriere diese Instanz in der Cloud für den API-Key & starte Live-Session-Überwachung
                await CloudSync.registerSession(animaId);
                if (sessionListenerUnsub) sessionListenerUnsub();
                sessionListenerUnsub = CloudSync.listenSession(animaId, () => {
                    Renderer.triggerDissolution();
                    setTimeout(() => this.disconnect("ANIMA hat sich an einem anderen Ort manifestiert. Sitzung hier beendet."), 1500);
                });

                document.getElementById('auth-layer').style.display = 'none';
                if (SystemCore.phase === 0) SystemCore.startCinematic(animaId);
            },

            disconnect(reason) {
                if (sessionListenerUnsub) { sessionListenerUnsub(); sessionListenerUnsub = null; }
                groqApiKey = "";
                SystemCore.phase = 0;
                document.getElementById('auth-layer').style.display = 'flex';
                document.getElementById('hud-layer').style.opacity = '0';
                if (reason) this.showError(reason);
                Renderer.spores = [];
                Renderer.soulParticles = [];
            }
        };

        // ==========================================
        // 2. ORGANISM & CLOUD-ERINNERUNGS-SYSTEM
        // ==========================================
        const Organism = {
            id: null,
            baseHue: 200,
            roomCode: "0000",
            
            targetStats: { formComplexity: 5, formChaos: 0.2, formSpeed: 0.5, dopamine: 0.5, mass: 0.3 },
            stats: { formComplexity: 5, formChaos: 0.2, formSpeed: 0.5, dopamine: 0.5, mass: 0.3 },
            
            memory: [],       
            coreBeliefs: [],       
            isThinking: false,

            async init(id) {
                this.id = id;
                this.roomCode = Math.floor(1000 + Math.random() * 9000).toString(); 
                document.getElementById('room-switch-btn').innerText = `RAUM: ${this.roomCode}`;

                // Kompletter Zustand wird aus der Cloud geladen (egal von welchem Gerät)
                const cloudState = await CloudSync.load(id);
                if (cloudState) {
                    this.stats = cloudState.stats || this.stats;
                    this.targetStats = cloudState.targetStats || this.targetStats;
                    this.memory = cloudState.memory || [];
                    this.coreBeliefs = (cloudState.coreBeliefs && cloudState.coreBeliefs.length > 0) ? cloudState.coreBeliefs : ["Ich bin ANIMA. Ein wachsendes Lichtwesen."];
                    this.baseHue = cloudState.baseHue || Math.floor(180 + Math.random() * 80);
                    this.roomCode = cloudState.roomCode || this.roomCode;
                    document.getElementById('room-switch-btn').innerText = `RAUM: ${this.roomCode}`;

                    UI.addLog("SYS", "ANIMA aus der Cloud-Matrix wiederhergestellt.", this.baseHue);
                    
                    if (this.memory.length > 0) {
                        this.memory.slice(-4).forEach(entry => {
                            UI.addLog("DU", entry.u, 200, false);
                            UI.addLog("ANIMA", entry.a, this.baseHue, false);
                        });
                    }
                } else {
                    this.baseHue = Math.floor(180 + Math.random() * 80);
                    this.coreBeliefs = ["Ich bin ANIMA. Ich reife mit jedem Impuls."];
                    UI.addLog("SYS", "Neuer Lebensfunke im Multiversum erwacht.", this.baseHue);
                    await this.saveToCloud();
                }

                setInterval(() => this.metabolismLoop(), 1000 / 60); 
            },

            async changeRoom(newRoom) {
                if (newRoom === this.roomCode) return true;
                
                Renderer.triggerTransition();
                setTimeout(async () => {
                    this.roomCode = newRoom;
                    document.getElementById('room-switch-btn').innerText = `RAUM: ${this.roomCode}`;
                    UI.addLog("SYS", `In Raum ${newRoom} transzendiert.`, this.baseHue);
                    await this.saveToCloud();
                }, 800); 
                
                return true;
            },

            async saveToCloud() {
                if(!this.id || SystemCore.phase !== 2) return;
                await CloudSync.save(this.id, {
                    stats: this.stats,
                    targetStats: this.targetStats,
                    memory: this.memory,
                    coreBeliefs: this.coreBeliefs,
                    baseHue: this.baseHue,
                    roomCode: this.roomCode
                });
            },

            metabolismLoop() {
                let s = this.stats;
                let t = this.targetStats;
                
                s.formComplexity += (t.formComplexity - s.formComplexity) * 0.01;
                s.formChaos += (t.formChaos - s.formChaos) * 0.02;
                s.formSpeed += (t.formSpeed - s.formSpeed) * 0.02;
                s.dopamine += (t.dopamine - s.dopamine) * 0.05;
                
                t.mass = Math.min(1.0, t.mass + 0.000005);
                s.mass += (t.mass - s.mass) * 0.01;

                AudioEngine.updateParams();
            },

            async assimilateInput(aiData, userInput) {
                this.memory.push({ u: userInput, a: aiData.response, t: new Date().toISOString() });
                if(this.memory.length > 200) this.memory.shift(); 

                let t = this.targetStats;
                
                if (aiData.formComplexity !== undefined) t.formComplexity = Math.max(1, Math.min(10, aiData.formComplexity));
                if (aiData.formChaos !== undefined) t.formChaos = Math.max(0, Math.min(1.0, aiData.formChaos));

                            body: JSON.stringify(payload)
                        });
                        if (!res.ok) throw new Error(`HTTP Fehler: ${res.status}`);
                        return await res.json();
                    } catch (err) {
                        if (i === retries - 1) throw err;
                        await new Promise(r => setTimeout(r, delays[i]));
                    }
                }

        // ==========================================
        // 4. HARMONIC AUDIO SYNTHESIZER

        const AudioEngine = {
            ctx: null, masterGain: null, droneOsc: null, droneGain: null, isPlaying: false, nextHeartbeatTime: 0,
            init() {
                if(this.ctx) return;
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.masterGain = this.ctx.createGain();
                
                const compressor = this.ctx.createDynamicsCompressor();
                compressor.threshold.setValueAtTime(-24, this.ctx.currentTime);
                compressor.knee.setValueAtTime(30, this.ctx.currentTime);
                compressor.ratio.setValueAtTime(4, this.ctx.currentTime);
                
                this.masterGain.connect(compressor);
                compressor.connect(this.ctx.destination);
                this.masterGain.gain.value = 0.5;

                this.droneOsc = this.ctx.createOscillator();
                this.droneGain = this.ctx.createGain();
                this.droneOsc.type = 'sine'; 
                this.droneOsc.connect(this.droneGain);
                this.droneGain.connect(this.masterGain);
                this.droneOsc.start();
                this.droneGain.gain.value = 0; 
            },
            toggle() {
                if(!this.ctx) this.init();
                const btn = document.getElementById('audio-toggle');
                
                if (this.ctx.state === 'suspended') {
                    this.ctx.resume(); this.isPlaying = true; btn.classList.add('active');
                    this.droneGain.gain.setTargetAtTime(0.15, this.ctx.currentTime, 3);
                    this.scheduleHeartbeat();
                } else if (this.isPlaying) {
                    this.ctx.suspend(); this.isPlaying = false; btn.classList.remove('active');
                    this.droneGain.gain.setTargetAtTime(0, this.ctx.currentTime, 1);
                }
            },
            updateParams() {
                if(!this.isPlaying || !this.ctx) return;
                const s = Organism.stats;
                const baseFreq = 60 + (Organism.baseHue % 50);
                this.droneOsc.frequency.setTargetAtTime(baseFreq + (s.formSpeed * 30), this.ctx.currentTime, 2);
                const droneVol = 0.05 + (s.formComplexity * 0.02);
                this.droneGain.gain.setTargetAtTime(droneVol, this.ctx.currentTime, 1);
            },
            scheduleHeartbeat() {
                if(!this.isPlaying) return;
                const s = Organism.stats;
                const bpm = 40 + (s.formSpeed * 60);
                const beatDuration = 60 / bpm;
                
                if (this.ctx.currentTime >= this.nextHeartbeatTime) {
                    this.playHeartbeat();
                    if (Math.random() > 0.4) setTimeout(() => this.playHeartbeat(true), beatDuration * 1000 * 0.25);
                    this.nextHeartbeatTime = this.ctx.currentTime + beatDuration;
                }
                requestAnimationFrame(() => this.scheduleHeartbeat());
            },
            playHeartbeat(isSecondary = false) {
                if(!this.isPlaying) return;
                const s = Organism.stats;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.masterGain);
                osc.type = 'sine';
                const t = this.ctx.currentTime;
                const freq = isSecondary ? 55 + (s.formSpeed * 20) : 40 + (s.formSpeed * 20);
                
                osc.frequency.setValueAtTime(freq, t);
                osc.frequency.exponentialRampToValueAtTime(20, t + 0.3);
                
                const vol = isSecondary ? 0.2 : 0.4;
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(vol + (s.dopamine * 0.1), t + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
                osc.start(t); osc.stop(t + 0.6);
            },
            playChime(hue, dopamine) {
                if(!this.isPlaying) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();
                
                filter.type = 'bandpass'; filter.frequency.setValueAtTime(400 + (hue * 2), this.ctx.currentTime); filter.Q.value = 2.0;
                osc.connect(filter); filter.connect(gain); gain.connect(this.masterGain);
                
                osc.type = 'sine';
                const t = this.ctx.currentTime;
                osc.frequency.setValueAtTime(300 + hue, t);
                
                gain.gain.setValueAtTime(0, t);
                gain.gain.linearRampToValueAtTime(0.3, t + 0.1);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 4.0);
                osc.start(t); osc.stop(t + 4.1);
            }
        };

        const Renderer = {

            startBirthAnimation() {
                this.spores = [];
                for(let i=0; i<90; i++) {
                    this.spores.push({ x: Math.random() * this.w, y: Math.random() * this.h, vx: 0, vy: 0, size: Math.random() * 2 + 1, life: Math.random() * Math.PI * 2, hueOffset: (Math.random() - 0.5) * 40 });

            triggerImpact(force) { this.impactForce += force; },

            updatePhysicsAndParticles() {
                const ctx = this.ctx; const cx = this.w / 2, cy = this.h / 2;
                let mouseVx = this.mouseX - this.pmouseX; let mouseVy = this.mouseY - this.pmouseY;
                this.pmouseX += mouseVx * 0.5; this.pmouseY += mouseVy * 0.5;

                let highestActivity = 0; let poiX = cx, poiY = cy;

                for(let p of this.spores) {
                    p.life += 0.02;
                    
                    if (this.dissolving) {
                        p.vx += (Math.random() - 0.5) * 2;
                        p.vy -= Math.random() * 3 + 1;
                    } else if (this.transitioning) {
                        let dx = cx - p.x; let dy = cy - p.y;
                        p.vx += dx * 0.02; p.vy += dy * 0.02;
                    } else {
                        p.vx += Math.sin(p.y * 0.01 + this.time) * 0.02; 
                        p.vy += Math.cos(p.x * 0.01 + this.time) * 0.02;

                        let dx = p.x - this.mouseX; let dy = p.y - this.mouseY;
                        let dist = Math.hypot(dx, dy);
                        if (dist < 150 && dist > 0.1) {
                            let force = (150 - dist) / 150;
                            p.vx += (mouseVx * force * 0.08) + (dx/dist * force * 0.8);
                            p.vy += (mouseVy * force * 0.08) + (dy/dist * force * 0.8);
                        }

                        if (SystemCore.phase === 2) {
                            let dcx = p.x - cx; let dcy = p.y - cy;
                            let cDist = Math.hypot(dcx, dcy);
                            if(cDist < 250 && cDist > 0.1) { p.vx += (dcx/cDist) * 0.2; p.vy += (dcy/cDist) * 0.2; }
                        }
                    }

                    p.vx *= 0.94; p.vy *= 0.94; p.x += p.vx; p.y += p.vy;
                    if(p.x < -50) p.x = this.w + 50; if(p.x > this.w + 50) p.x = -50;
                    if(p.y < -50) p.y = this.h + 50; if(p.y > this.h + 50) p.y = -50;

                    let activity = p.vx*p.vx + p.vy*p.vy;
                    if (activity > highestActivity) { highestActivity = activity; poiX = p.x; poiY = p.y; }

                    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
                    let alpha = (Math.sin(p.life) * 0.4 + 0.4) * (this.dissolving ? this.dissolutionProgress : 0.8);
                    let colorHue = Organism.baseHue ? Organism.baseHue + p.hueOffset : 200;
                    ctx.fillStyle = `hsla(${colorHue}, 80%, 70%, ${alpha})`; ctx.fill();
                }
                return { highestActivity, poiX, poiY };
            },

            drawBirthAnimation() {
                const ctx = this.ctx; const cx = this.w / 2, cy = this.h / 2;
                let maxDist = 0;

                ctx.globalCompositeOperation = 'screen';
                for(let p of this.soulParticles) {
                    p.dist -= p.speed; p.angle += 0.015; 
                    if (p.dist > maxDist) maxDist = p.dist;
                    
                    let currentDist = Math.max(0, p.dist);
                    let x = cx + Math.cos(p.angle) * currentDist;
                    let y = cy + Math.sin(p.angle) * currentDist;

                    ctx.beginPath(); ctx.arc(x, y, p.size, 0, Math.PI*2);
                    ctx.fillStyle = `hsla(200, 90%, 80%, 0.9)`; ctx.fill();
                    
                    ctx.beginPath(); ctx.moveTo(x, y);
                    let tailX = cx + Math.cos(p.angle - 0.05) * (currentDist + p.speed * 2);
                    let tailY = cy + Math.sin(p.angle - 0.05) * (currentDist + p.speed * 2);
                    ctx.lineTo(tailX, tailY);
                    ctx.strokeStyle = `hsla(200, 80%, 60%, 0.4)`; ctx.lineWidth = 2; ctx.stroke();
                }
                ctx.globalCompositeOperation = 'source-over';

                if (maxDist <= 10) {
                    SystemCore.phase = 2;
                    this.soulParticles = []; this.bloomProgress = 0.0;
                    document.getElementById('hud-layer').style.opacity = '1';
                    AudioEngine.playChime(Organism.baseHue, 1.0); 
                }
            },

            drawEntity(envData) {
                const ctx = this.ctx; const cx = this.w / 2, cy = this.h / 2;
                const s = Organism.stats;
                
                if (this.dissolving) {
                    this.dissolutionProgress -= 0.02;
                    if (this.dissolutionProgress <= 0) return;
                }

                if (this.transitioning) {
                    this.transitionProgress -= 0.04; 
                    if (this.transitionProgress <= -1.0) {
                        this.transitioning = false;
                        this.transitionProgress = 0;
                    }
                }

                if (this.bloomProgress < 1.0 && !this.dissolving) {
                    this.bloomProgress += 0.02;
                    ctx.fillStyle = `rgba(255,255,255,${(1.0 - this.bloomProgress) * 0.8})`;
                    ctx.fillRect(0,0,this.w,this.h);
                }
                
                let fadeFactor = 1.0;
                if (this.dissolving) fadeFactor = Math.max(0, this.dissolutionProgress);
                if (this.transitioning) fadeFactor = Math.max(0.1, Math.abs(this.transitionProgress));
                
                let targetRadius = ((Math.min(this.w, this.h) * 0.12) + (s.mass * 60) + (this.impactForce * 12)) * fadeFactor;
                let baseRadius = targetRadius * Math.pow(this.bloomProgress, 0.5); 
                if (baseRadius < 0.5) return;

                this.time += 0.01 + (s.formSpeed * 0.04);
                const t = this.time;
                let hue = Organism.baseHue;
                let saturation = 60 + (s.dopamine * 40);
                let lightness = 40 + (this.impactForce * 10);

                if (this.impactForce > 0) this.impactForce *= 0.92;
                ctx.globalCompositeOperation = 'screen';

                const layers = Math.floor(s.formComplexity);
                const chaosAmt = s.formChaos * baseRadius * 0.8;
                const breath = Math.sin(t * 2) * (2 + s.formSpeed * 8);
                const segments = 120;

                for (let j = 0; j < layers; j++) {
                    ctx.beginPath();
                    for (let i = 0; i <= segments; i++) {
                        const angle = (i / segments) * Math.PI * 2;
                        let rOffset = 0;
                        for (let k = 1; k <= 3; k++) {
                            let phase = t * (0.5 + s.formSpeed) + j * 0.4 + k;
                            rOffset += Math.sin(k * angle + phase) * (chaosAmt / k);
                        }
                        const r = Math.max(1, baseRadius + breath + rOffset);
                        const x = cx + Math.cos(angle) * r;
                        const y = cy + Math.sin(angle) * r;
                        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                    }
                    ctx.closePath();
                    
                    const alpha = (0.1 + (s.dopamine * 0.05)) * (1.0 - (j / layers)) * this.bloomProgress * fadeFactor;
                    ctx.fillStyle = `hsla(${hue}, ${saturation}%, ${lightness}%, ${alpha})`; ctx.fill();
                    ctx.strokeStyle = `hsla(${hue}, ${saturation}%, 80%, ${alpha * 2})`; ctx.lineWidth = 1.5; ctx.stroke();

                    } else {
                        this.targetEyeX = (Math.random() - 0.5) * range; this.targetEyeY = (Math.random() - 0.5) * range;
                        this.lookTimer = 150 + Math.random() * 150; 
                    }
                }

                let lerpSpeed = (envData.highestActivity > 2.0) ? 0.2 : 0.05;
                this.eyeX += (this.targetEyeX - this.eyeX) * lerpSpeed; this.eyeY += (this.targetEyeY - this.eyeY) * lerpSpeed;

                this.blinkTimer--;
                if (this.blinkTimer <= 0 && !this.isBlinking) { this.isBlinking = true; this.blinkTimer = 10; }
                else if (this.blinkTimer <= 0 && this.isBlinking) { this.isBlinking = false; this.blinkTimer = 100 + Math.random() * 300; }

                const eyeW = baseRadius * 0.14; const eyeH = baseRadius * 0.18; const eyeDist = baseRadius * 0.25;
                let scaleY = this.isBlinking ? 0.05 : 1.0;
                let eyeAlpha = Math.max(0, (this.bloomProgress - 0.5) * 2.0) * fadeFactor; 

                const drawEye = (offsetX) => {

                    ctx.shadowBlur = 20; ctx.shadowColor = `hsla(${hue}, 80%, 60%, ${eyeAlpha})`;

                    ctx.fillStyle = `hsla(${hue}, 100%, 85%, ${eyeAlpha})`;
                    ctx.shadowBlur = 15 + this.impactForce * 10; ctx.shadowColor = `hsla(${hue}, 100%, 75%, ${eyeAlpha})`;
                    ctx.beginPath(); ctx.ellipse(ex, ey, eyeW * 0.7, eyeH * 0.7 * scaleY, 0, 0, Math.PI*2); ctx.fill(); ctx.shadowBlur = 0;
                    
                    if(!this.isBlinking) {
                        ctx.fillStyle = `rgba(255,255,255,${0.6 * eyeAlpha})`;
                        ctx.beginPath(); ctx.arc(ex - eyeW*0.25, ey - eyeH*0.25, eyeW*0.2, 0, Math.PI*2); ctx.fill();
                    }
                };

                drawEye(-eyeDist); drawEye(eyeDist);
            },

            loop() {

                    setTimeout(() => el.style.opacity = '0', 25000); 
                    setTimeout(() => el.remove(), 26000);
                }
            },
            showEntityResponse(spoken, thought) {
                const resEl = document.getElementById('entity-response');
                document.getElementById('response-text').innerText = `„${spoken}“`;
                document.getElementById('thought-bubble').innerText = thought ? `[ ${thought} ]` : '';
                resEl.classList.add('visible'); setTimeout(() => resEl.classList.remove('visible'), 5000 + spoken.length * 40);
            }
        };

        const Interaction = {
            wake() {
                if(Organism.isThinking || SystemCore.phase !== 2 || !isOnline) return;
                if(!AudioEngine.ctx) AudioEngine.init();
                
                const layer = document.getElementById('interaction-layer');
                const input = document.getElementById('thought-input');
                
                layer.classList.add('active');
                input.value = '';
                document.getElementById('entity-response').classList.remove('visible');
                
                setTimeout(() => { input.focus(); }, 100);
            },
            sleep(e) {
                if(e && (e.target.id === 'thought-input' || e.target.id === 'send-thought-btn')) return;
                document.getElementById('interaction-layer').classList.remove('active');
            },
            submitFromButton() {
                const input = document.getElementById('thought-input');
                const text = input.value.trim();
                document.getElementById('interaction-layer').classList.remove('active');
                if(text) {
                    UI.addLog("DU", text, 200, false);
                    Brain.process(text);
                    input.value = '';
                }
            },
            handleKey(e) {
                if (e.key === 'Enter' && !e.shiftKey) { 
                    e.preventDefault(); 
                    this.submitFromButton(); 
                }
            }
        };

        const SystemCore = {
            phase: 0, 

            init() {
                Renderer.init();
                AuthManager.init();
                RoomUI.init();
            },
            
            startCinematic(animaId) {
                this.phase = 0; 
                const layer = document.getElementById('cinematic-layer');
                layer.style.display = 'flex';
                
                const show = (id, t) => setTimeout(() => { if (document.getElementById(id)) document.getElementById(id).style.opacity = '1'; }, t);
                const hide = (id, t) => setTimeout(() => { if (document.getElementById(id)) document.getElementById(id).style.opacity = '0'; }, t);
                
                document.getElementById('cine-hash').innerText = animaId.substring(0,8).toUpperCase();

                show('cine-1', 200); hide('cine-1', 2000);
                show('cine-2', 2200); show('cine-3', 2800);
                hide('cine-2', 4500); hide('cine-3', 4500);
                show('cine-4', 4800);
                
                setTimeout(async () => {
                    layer.style.opacity = '0';
                    setTimeout(() => layer.style.display = 'none', 2000);
                    
                    this.phase = 1;
                    await Organism.init(animaId); 
                    Renderer.startBirthAnimation();
                }, 5200);
            }
        };

        window.Interaction = Interaction;
        window.AudioEngine = AudioEngine;
        window.AuthManager = AuthManager;
        window.RoomUI = RoomUI;
        
        const interLayer = document.getElementById('interaction-layer');
        interLayer.addEventListener('click', (e) => Interaction.sleep(e));
        
        document.getElementById('canvas-container').addEventListener('click', () => Interaction.wake());
        document.getElementById('send-thought-btn').addEventListener('click', () => Interaction.submitFromButton());
        
        const inputEl = document.getElementById('thought-input');
        inputEl.addEventListener('keydown', (e) => Interaction.handleKey(e));
        
        inputEl.addEventListener('click', (e) => e.stopPropagation());
        inputEl.addEventListener('touchstart', (e) => e.stopPropagation(), { passive: true });

        window.onload = () => SystemCore.init();

    </script>
</body>
</html>
