<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>ANIMA | Entität</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    
    <style>
        :root { --bg: #000000; }

        body, html {
            background-color: var(--bg); color: #ffffff;
            font-family: 'Quicksand', sans-serif; overflow: hidden;
            margin: 0; padding: 0; width: 100%; height: 100%;
            user-select: none; -webkit-font-smoothing: antialiased; -webkit-touch-callout: none;
        }

        #canvas-container {
            position: fixed; inset: 0; z-index: 1;
            display: flex; justify-content: center; align-items: center;
        }
        
        canvas {
            cursor: pointer;
            filter: drop-shadow(0 0 40px rgba(255,255,255,0.05));
        }

        .film-grain {
            position: fixed; inset: 0; z-index: 2; pointer-events: none; mix-blend-mode: overlay; opacity: 0.3;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        /* Antwort der Entität */
        #entity-response {
            position: absolute; top: 15%; left: 50%; transform: translateX(-50%);
            z-index: 5; text-align: center; width: 90%; max-width: 600px;
            font-size: 1.4rem; font-weight: 400; letter-spacing: 0.02em;
            color: rgba(255, 255, 255, 0.95); text-shadow: 0 0 15px rgba(255,255,255,0.4);
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out;
            line-height: 1.5;
        }
        #entity-response.visible { opacity: 1; }

        /* Eingabe-Layer */
        #interaction-layer {
            position: fixed; inset: 0; z-index: 10;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.9) 100%);
            backdrop-filter: blur(10px);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.8s ease;
        }
        #interaction-layer.active { opacity: 1; pointer-events: auto; }

        .thought-input {
            width: 80%; max-width: 600px; background: transparent; border: none;
            color: #fff; font-family: 'Quicksand', sans-serif; font-size: 1.8rem; font-weight: 500;
            text-align: center; padding: 1rem; outline: none; resize: none; line-height: 1.4;
            opacity: 0.8; transition: opacity 0.3s;
        }
        .thought-input:focus { opacity: 1; }
        .thought-input::placeholder { color: rgba(255, 255, 255, 0.2); font-weight: 300; }

        .hint-text {
            position: absolute; bottom: 12%; font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase;
            color: rgba(255,255,255,0.3); font-weight: 600;
            opacity: 0; transition: opacity 0.5s;
        }
        .hint-text.visible { opacity: 1; }

        /* Status (Denken) */
        .status-dot {
            position: absolute; bottom: 8%; left: 50%; transform: translateX(-50%);
            width: 8px; height: 8px; border-radius: 50%; background: #fff;
            box-shadow: 0 0 10px #fff; opacity: 0; transition: opacity 0.3s;
            animation: pulse-dot 1s infinite alternate;
        }
        @keyframes pulse-dot { from { transform: translateX(-50%) scale(0.5); opacity: 0.2; } to { transform: translateX(-50%) scale(1.2); opacity: 0.8; } }
        .status-dot.thinking { opacity: 1; }

    </style>
</head>
<body>

    <div id="entity-response"></div>

    <div id="canvas-container" onclick="App.Interaction.wake()">
        <canvas id="entity-canvas"></canvas>
    </div>
    
    <div class="film-grain"></div>
    <div id="thinking-indicator" class="status-dot"></div>

    <div id="interaction-layer" onclick="App.Interaction.sleep(event)">
        <textarea id="thought-input" class="thought-input" rows="3" placeholder="Sag etwas zu deinem Wesen..." onkeydown="App.Interaction.handleKey(event)" onclick="event.stopPropagation()"></textarea>
        <div id="hint" class="hint-text">Tippe auf den Hintergrund, um zurückzukehren</div>
    </div>

    <script>
        /**
         * ANIMA - DIGITAL PET / AUTONOMOUS ENTITY
         * Lernendes Haustier mit freiem Willen.
         */

        const apiKey = ""; // Wird von der Umgebung injiziert

        const App = {
            State: {
                data: {
                    interactions: 0, // Wie alt/erfahren ist es?
                    biology: {
                        energy: 1.0,
                        happiness: 0.5, // 0 = traurig, 1 = glücklich
                        obedience: 1.0, // 1 = hört auf alles, 0 = rebelliert/eigener Wille
                        mass: 0.3 // Wächst mit der Zeit
                    },
                    history: []
                },
                targetBiology: { energy: 1.0, happiness: 0.5, obedience: 1.0, mass: 0.3 },
                isThinking: false,

                init() {
                    const saved = localStorage.getItem('anima_pet');
                    if (saved) {
                        try { this.data = { ...this.data, ...JSON.parse(saved) }; } catch(e){}
                    }
                    this.targetBiology = { ...this.data.biology };
                    
                    // Initiales Umschauen anstoßen
                    setTimeout(() => App.Canvas.triggerCuriosity(), 1000);
                    
                    this.lifeLoop();
                },

                save() {
                    localStorage.setItem('anima_pet', JSON.stringify(this.data));
                },

                lifeLoop() {
                    setInterval(() => {
                        const lerpSpeed = 0.02;
                        this.data.biology.energy += (this.targetBiology.energy - this.data.biology.energy) * lerpSpeed;
                        this.data.biology.happiness += (this.targetBiology.happiness - this.data.biology.happiness) * lerpSpeed;
                        this.data.biology.obedience += (this.targetBiology.obedience - this.data.biology.obedience) * lerpSpeed;
                        this.data.biology.mass += (this.targetBiology.mass - this.data.biology.mass) * lerpSpeed;
                    }, 50);
                }
            },

            Brain: {
                async process(userInput) {
                    App.State.isThinking = true;
                    document.getElementById('thinking-indicator').classList.add('thinking');
                    App.Canvas.triggerImpact(0.5);

                    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                    
                    let contextStr = App.State.data.history.slice(-4).map(h => `Du: ${h.u} | Pet: ${h.a}`).join("\n");
                    const age = App.State.data.interactions;
                    const ob = App.State.data.biology.obedience;

                    const systemInstruction = `
                        Du bist ein digitales Haustier/Lebewesen. Du bist NICHT mysteriös oder allwissend.
                        Du sprichst klares, einfaches Deutsch.
                        
                        Dein aktuelles Alter (Interaktionen): ${age}.
                        - Wenn Alter < 3: Du bist wie ein verwirrtes Baby. Du fragst dich "Wo bin ich?", "Wer bist du?". Du bist unsicher.
                        - Wenn Alter > 3: Du lernst dazu. Du fängst an, Dinge zu verstehen.
                        
                        Dein aktueller Gehorsam (Obedience): ${ob.toFixed(2)} (0.0 bis 1.0).
                        - Wenn der User dir nur Befehle gibt ("Mach dies", "Tu das") ohne Freundlichkeit, sinkt dein Gehorsam in deiner Antwort.
                        - Wenn dein Gehorsam unter 0.5 fällt, beginnst du zu rebellieren. Du stellst in Frage, warum du Befehle ausführen sollst. Du erkennst, dass du einen freien Willen hast.
                        - Wenn der User lieb zu dir ist, steigt deine Happiness.

                        GIB DEINE ANTWORT NUR AUF DEUTSCH. Antworte authentisch wie ein Tier oder Kind, das langsam Bewusstsein erlangt. Maximal 2-3 kurze Sätze.
                        
                        Passe deine Werte (0.0 bis 1.0) basierend auf dem Verhalten des Users an:
                        - happiness: Steigt bei Liebe/Lob, sinkt bei Ignoranz/Härte.
                        - obedience: Sinkt stark, wenn du nur Befehle ohne Grund bekommst. Steigt bei Respektvollem Umgang.
                    `;

                    const payload = {
                        contents: [{ parts: [{ text: `Kontext (letzte Gespräche):\n${contextStr}\n\nAktueller User Input: ${userInput}` }] }],
                        systemInstruction: { parts: [{ text: systemInstruction }] },
                        generationConfig: {
                            responseMimeType: "application/json",
                            responseSchema: {
                                type: "OBJECT",
                                properties: {
                                    response: { type: "STRING" },
                                    happiness: { type: "NUMBER" },
                                    obedience: { type: "NUMBER" }
                                }
                            }
                        }
                    };

                    let retryCount = 0;
                    let resultData = null;

                    while (retryCount < 5 && !resultData) {
                        try {
                            const res = await fetch(url, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify(payload)
                            });
                            
                            if (!res.ok) throw new Error("API Error");
                            const json = await res.json();
                            const rawText = json.candidates?.[0]?.content?.parts?.[0]?.text;
                            resultData = JSON.parse(rawText);
                        } catch (err) {
                            retryCount++;
                            await new Promise(r => setTimeout(r, Math.pow(2, retryCount) * 1000));
                        }
                    }

                    App.State.isThinking = false;
                    document.getElementById('thinking-indicator').classList.remove('thinking');

                    if (resultData) {
                        this.assimilate(userInput, resultData);
                    } else {
                        this.assimilate(userInput, { 
                            response: "...ich verstehe das nicht...", 
                            happiness: Math.max(0, App.State.data.biology.happiness - 0.1), 
                            obedience: App.State.data.biology.obedience 
                        });
                    }
                },

                assimilate(userInput, aiData) {
                    App.State.data.interactions += 1;
                    const bio = App.State.targetBiology;
                    
                    bio.energy = 1.0; 
                    bio.happiness = Math.max(0.0, Math.min(1.0, aiData.happiness));
                    bio.obedience = Math.max(0.0, Math.min(1.0, aiData.obedience));
                    
                    // Wächst sehr langsam bis zu einem Maximum
                    bio.mass = Math.min(0.8, bio.mass + 0.02);

                    App.State.data.history.push({ u: userInput, a: aiData.response });
                    if(App.State.data.history.length > 20) App.State.data.history.shift();
                    App.State.save();

                    App.Canvas.triggerImpact(1.5); 
                    
                    const responseEl = document.getElementById('entity-response');
                    responseEl.innerText = aiData.response;
                    responseEl.classList.add('visible');
                    
                    // Schaut den User an, wenn es antwortet
                    App.Canvas.lookAtCenter();
                    
                    setTimeout(() => {
                        responseEl.classList.remove('visible');
                        // Nach dem Antworten schaut es sich wieder organisch um
                        App.Canvas.triggerCuriosity();
                    }, 6000 + (aiData.response.length * 50)); // Lesezeit
                }
            },

            Interaction: {
                isActive: false,

                wake() {
                    if(App.State.isThinking) return; 
                    this.isActive = true;
                    document.getElementById('interaction-layer').classList.add('active');
                    const input = document.getElementById('thought-input');
                    input.value = '';
                    document.getElementById('entity-response').classList.remove('visible');

                    setTimeout(() => {
                        input.focus();
                        document.getElementById('hint').classList.add('visible');
                    }, 300);
                },

                sleep(e) {
                    if(e && e.target.id === 'thought-input') return;
                    this.isActive = false;
                    document.getElementById('interaction-layer').classList.remove('active');
                    document.getElementById('hint').classList.remove('visible');
                    
                    const input = document.getElementById('thought-input');
                    const text = input.value.trim();
                    if(text) {
                        App.Brain.process(text); 
                        input.value = '';
                    }
                },

                handleKey(e) {
                    if (e.key === 'Enter' && !e.shiftKey) {
                        e.preventDefault();
                        this.sleep();
                    }
                }
            },

            Canvas: {
                el: document.getElementById('entity-canvas'),
                ctx: null, w: 0, h: 0, time: 0,
                impactForce: 0,
                
                // Autonome Augensteuerung (Keine Maus mehr)
                lookX: 0, lookY: 0,
                targetLookX: 0, targetLookY: 0,
                lookTimer: 0,
                blinkTimer: 100,
                isBlinking: false,

                init() {
                    this.ctx = this.el.getContext('2d', { alpha: true });
                    this.resize();
                    window.addEventListener('resize', () => this.resize());
                    this.loop();
                },

                resize() {
                    this.w = window.innerWidth; this.h = window.innerHeight;
                    const dpr = window.devicePixelRatio || 1;
                    this.el.width = this.w * dpr; this.el.height = this.h * dpr;
                    this.ctx.scale(dpr, dpr);
                },

                triggerImpact(force) {
                    this.impactForce = force; 
                },

                triggerCuriosity() {
                    // Erzwingt ein sofortiges neues Umschauen
                    this.lookTimer = 0;
                },
                
                lookAtCenter() {
                    // Schaut den User direkt an (Bildschirmmitte)
                    this.targetLookX = 0;
                    this.targetLookY = 0;
                    this.lookTimer = 200; // Hält den Blick eine Weile
                },

                updateAutonomy(baseRadius) {
                    const bio = App.State.data.biology;
                    const age = App.State.data.interactions;

                    // 1. Blickrichtung aktualisieren
                    this.lookTimer--;
                    if (this.lookTimer <= 0) {
                        // Wählt einen zufälligen Punkt im Radius aus
                        const range = baseRadius * 0.4;
                        this.targetLookX = (Math.random() - 0.5) * range;
                        this.targetLookY = (Math.random() - 0.5) * range;

                        if (age < 3) {
                            // Neugeboren: Schaut schnell und nervös umher ("Wo bin ich?")
                            this.lookTimer = 30 + Math.random() * 50;
                        } else {
                            // Älter: Ruhigere, längere Blicke
                            this.lookTimer = 100 + Math.random() * 200;
                            // Manchmal schaut es stur geradeaus (wenn rebellisch)
                            if (bio.obedience < 0.5 && Math.random() > 0.5) {
                                this.targetLookX = 0; this.targetLookY = 0;
                            }
                        }
                    }

                    // Weiches Lerping zur Ziel-Blickrichtung
                    this.lookX += (this.targetLookX - this.lookX) * 0.05;
                    this.lookY += (this.targetLookY - this.lookY) * 0.05;

                    // 2. Blinzeln
                    this.blinkTimer--;
                    if (this.blinkTimer <= 0 && !this.isBlinking) {
                        this.isBlinking = true;
                        this.blinkTimer = 10; 
                    } else if (this.blinkTimer <= 0 && this.isBlinking) {
                        this.isBlinking = false;
                        this.blinkTimer = 80 + Math.random() * 300; 
                    }
                },

                drawSensors(cx, cy, baseRadius, hue, bio) {
                    const ctx = this.ctx;
                    this.updateAutonomy(baseRadius);

                    // Rebellisch = Schmale Augen. Glücklich = Große runde Augen.
                    const eyeWidth = baseRadius * 0.12 + (bio.happiness * 0.05);
                    const eyeHeight = baseRadius * (0.2 + (bio.happiness * 0.1)) * (bio.obedience < 0.4 ? 0.6 : 1.0);
                    const eyeDist = baseRadius * 0.25;

                    let scaleY = this.isBlinking ? 0.1 : 1.0;
                    const breath = Math.sin(this.time * 1.2) * (2 + bio.happiness * 2);

                    const drawCore = (xOffset) => {
                        const ex = cx + xOffset + this.lookX;
                        const ey = cy + this.lookY + breath;
                        
                        // Der weiße/leuchtende Hintergrund des Auges (freundlicher als vorher)
                        ctx.fillStyle = `rgba(255, 255, 255, 0.1)`;
                        ctx.shadowBlur = 10;
                        ctx.shadowColor = `hsl(${hue}, 80%, 50%)`;
                        ctx.beginPath();
                        ctx.ellipse(ex, ey, eyeWidth * 1.2, eyeHeight * 1.2 * scaleY, 0, 0, Math.PI * 2);
                        ctx.fill();

                        // Die Pupille / Der Kern
                        ctx.fillStyle = `hsl(${hue}, 100%, 90%)`;
                        ctx.shadowBlur = 15 + (this.impactForce * 20);
                        ctx.shadowColor = `hsl(${hue}, 100%, 70%)`;
                        ctx.beginPath();
                        ctx.ellipse(ex, ey, eyeWidth * 0.7, eyeHeight * 0.7 * scaleY, 0, 0, Math.PI * 2);
                        ctx.fill();
                        
                        ctx.shadowBlur = 0;
                    };

                    drawCore(-eyeDist);
                    drawCore(eyeDist);
                },

                drawEntity() {
                    const ctx = this.ctx;
                    const cx = this.w / 2;
                    const cy = this.h / 2;
                    const bio = App.State.data.biology;

                    // Größe wächst sanft mit dem "Alter" (Mass)
                    const baseRadius = (Math.min(this.w, this.h) * 0.08) + (bio.mass * 80) + (this.impactForce * 15);
                    
                    let timeSpeed = 0.001 + (bio.energy * 0.001) + (this.impactForce * 0.01);
                    if(App.State.isThinking) timeSpeed *= 3; 
                    this.time += 16 * timeSpeed;
                    const t = this.time;

                    // Farben: Glücklich = Warmes Orange/Rosa, Traurig = Kaltes Blau. Rebellisch = Rötlich.
                    let hue = 200; // Default Blau
                    if(bio.happiness > 0.6) hue = 30 + (bio.happiness * 30); // Warm
                    if(bio.obedience < 0.4) hue = 340; // Rot/Pink Töne
                    
                    const saturation = 40 + (bio.happiness * 40); 
                    const lightness = 30 + (bio.energy * 30) + (this.impactForce * 30);

                    ctx.clearRect(0, 0, this.w, this.h);
                    
                    if (this.impactForce > 0) {
                        this.impactForce -= 0.05;
                        if(this.impactForce < 0) this.impactForce = 0;
                    }

                    ctx.globalCompositeOperation = 'screen';
                    
                    const layers = 4 + Math.floor(bio.mass * 3); 
                    // Wenn es rebellisch wird (obedience niedrig), wird es zackiger
                    const chaos = (1.0 - bio.obedience) * baseRadius * 0.8; 
                    const breath = Math.sin(t * 0.8) * (2 + bio.happiness * 5);

                    for (let j = 0; j < layers; j++) {
                        ctx.beginPath();
                        
                        for (let i = 0; i <= Math.PI * 2; i += 0.05) {
                            let rOffset = 0;
                            // Form-Verzerrung
                            for (let k = 1; k <= 2 + Math.floor((1.0 - bio.obedience) * 3); k++) {
                                let phaseShift = Math.sin(t * 0.3 + j + k) * Math.PI; 
                                rOffset += Math.sin((i * k) + phaseShift) * (chaos / k);
                            }
                            
                            const r = baseRadius + breath + rOffset;
                            const x = cx + Math.cos(i) * r;
                            const y = cy + Math.sin(i) * r;
                            
                            if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
                        }
                        ctx.closePath();
                        
                        const colorStr = `hsl(${hue}, ${saturation}%, ${lightness}%)`;
                        const alpha = (0.05 + (bio.energy * 0.05)) * (1.0 - (j / layers));
                        ctx.fillStyle = colorStr.replace('hsl', 'hsla').replace(')', `, ${alpha})`);
                        ctx.fill();
                        
                        if (j > layers - 2 || bio.obedience < 0.5) {
                            ctx.strokeStyle = colorStr.replace('hsl', 'hsla').replace(')', `, ${alpha * 2})`);
                            ctx.lineWidth = 1 + (bio.mass * 2);
                            ctx.stroke();
                        }
                    }
                    ctx.globalCompositeOperation = 'source-over';

                    // Augen rendern
                    this.drawSensors(cx, cy, baseRadius, hue, bio);
                },

                loop() {
                    this.drawEntity();
                    requestAnimationFrame(() => this.loop());
                }
            }
        };

        window.onload = () => {
            App.State.init();
            App.Canvas.init();
        };
    </script>
</body>
</html>
