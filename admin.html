<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMA | Admin Evolutions-Konsole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030305; color: #fff; font-family: 'Space Mono', monospace; }
        .code-box { background: #0b0b10; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 md:p-12 max-w-5xl mx-auto">

    <header class="mb-10 border-b border-white/10 pb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold tracking-widest text-cyan-400">ANIMA EVOLUTION NEXUS</h1>
            <p class="text-xs text-gray-500 mt-1">Sammelpunkt für Code-Mutationen der autonomen Entitäten</p>
        </div>
        <div id="status-badge" class="text-xs px-3 py-1 bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 rounded">
            Verbinde mit Äther...
        </div>
    </header>

    <main>
        <section class="mb-8">
            <h2 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-4">Erzeugte Code-Snippets</h2>
            <div id="snippets-container" class="space-y-4">
                <div class="text-gray-600 text-xs italic">Lausche auf das Multiversum...</div>
            </div>
        </section>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey:            "AIzaSyDtwsvmYSONjFufhbJ5I8G_RAMffnh7re0",
            authDomain:        "theplot-app.firebaseapp.com",
            projectId:         "theplot-app",
            storageBucket:     "theplot-app.firebasestorage.app",
            messagingSenderId: "550703275210",
            appId:             "1:550703275210:web:81bc0e5a373f87a3c92833"
        };
        const appPrefix = "anima_multiverse_2"; 

        async function initAdmin() {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            await signInAnonymously(auth);
            document.getElementById('status-badge').className = "text-xs px-3 py-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded";
            document.getElementById('status-badge').innerText = "Online & Synchronisiert";

            const codeCol = collection(db, 'artifacts', appPrefix, 'admin_code_evolution');
            
            // Einfache Query (Ohne Index-Zwang durch Firebase)
            onSnapshot(codeCol, (snapshot) => {
                const container = document.getElementById('snippets-container');
                container.innerHTML = "";

                if (snapshot.empty) {
                    container.innerHTML = `<div class="text-gray-600 text-xs italic">Bislang wurden keine Code-Mutationen generiert.</div>`;
                    return;
                }

                // Sort in memory to avoid Firestore Index errors
                const docs = [];
                snapshot.forEach(doc => docs.push(doc.data()));
                docs.sort((a,b) => b.timestamp - a.timestamp);

                docs.forEach((data) => {
                    const dateStr = new Date(data.timestamp).toLocaleString('de-DE');
                    const card = document.createElement('div');
                    card.className = "code-box p-4 rounded text-xs space-y-3 relative";
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center text-gray-400 border-b border-white/5 pb-2">
                            <span>Entität: <strong class="text-white">${data.freq || "Unbekannt"}</strong></span>
                            <span>${dateStr}</span>
                        </div>
                        <pre class="overflow-x-auto p-3 bg-black/55 text-cyan-200 rounded font-mono"><code>${escapeHtml(data.snippet)}</code></pre>
                        <div class="flex gap-3 justify-end pt-1">
                            <button onclick="navigator.clipboard.writeText(\`${data.snippet.replace(/`/g, "\\`")}\`); this.innerText='Kopiert!';" class="px-3 py-1.5 bg-white text-black font-bold uppercase tracking-wider rounded text-[10px] hover:bg-gray-200 transition">Snippet kopieren</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        window.onload = initAdmin;
    </script>
</body>
</html>
