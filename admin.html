<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMA | Admin Evolutions-Konsole</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #030305; color: #fff; font-family: 'Space Mono', monospace; }
        .code-box { background: #0b0b10; border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-6 md:p-12 max-w-5xl mx-auto">

    <header class="mb-10 border-b border-white/10 pb-6 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold tracking-widest text-cyan-400">ANIMA EVOLUTION NEXUS</h1>
            <p class="text-xs text-gray-500 mt-1">Admin Konsole zur Code-Sichtung autonomer Entitäten</p>
        </div>
        <div id="status-badge" class="text-xs px-3 py-1 bg-yellow-500/10 text-yellow-400 border border-yellow-500/20 rounded">
            Verbinde mit Äther...
        </div>
    </header>

    <main>
        <section class="mb-8">
            <h2 class="text-sm font-bold uppercase tracking-wider text-gray-400 mb-4">Vorschläge & Code-Mutationen der Animas</h2>
            <div id="snippets-container" class="space-y-4">
                <div class="text-gray-600 text-xs italic">Lausche auf evolutionäre Code-Snippets aus dem Multiversum...</div>
            </div>
        </section>
    </main>

    <!-- FIREBASE MODULE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : null;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'anima-evolution-nexus';

        async function initAdmin() {
            if (!firebaseConfig) {
                document.getElementById('status-badge').innerText = "Firebase Konfiguration fehlt";
                return;
            }

            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            await signInAnonymously(auth);
            document.getElementById('status-badge').className = "text-xs px-3 py-1 bg-green-500/10 text-green-400 border border-green-500/20 rounded";
            document.getElementById('status-badge').innerText = "Online & Synchronsiert";

            const codeCol = collection(db, 'artifacts', appId, 'public', 'data', 'admin_code_evolution');
            
            onSnapshot(codeCol, (snapshot) => {
                const container = document.getElementById('snippets-container');
                container.innerHTML = "";

                if (snapshot.empty) {
                    container.innerHTML = `<div class="text-gray-600 text-xs italic">Bislang wurden keine Code-Mutationen von Entitäten übermittelt.</div>`;
                    return;
                }

                snapshot.forEach((docSnap) => {
                    const data = docSnap.data();
                    const dateStr = new Date(data.timestamp).toLocaleString('de-DE');

                    const card = document.createElement('div');
                    card.className = "code-box p-4 rounded text-xs space-y-3 relative";
                    
                    card.innerHTML = `
                        <div class="flex justify-between items-center text-gray-400 border-b border-white/5 pb-2">
                            <span>Entität: <strong class="text-white">${data.freq}</strong> (${data.entityId.substring(0,6)}...)</span>
                            <span>${dateStr}</span>
                        </div>
                        <pre class="overflow-x-auto p-3 bg-black/55 text-cyan-200 rounded font-mono"><code>${escapeHtml(data.snippet)}</code></pre>
                        <div class="flex gap-3 justify-end pt-1">
                            <button onclick="navigator.clipboard.writeText(${JSON.stringify(data.snippet)}); alert('Code kopiert!');" class="px-3 py-1.5 bg-white text-black font-bold uppercase tracking-wider rounded text-[10px] hover:bg-gray-200">Snippet kopieren</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            });
        }

        function escapeHtml(text) {
            return text.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
        }

        window.onload = initAdmin;
    </script>
</body>
</html>
