<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANIMA | Evolution Terminal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #030303;
            color: #00ffcc;
            font-family: 'Space Mono', monospace;
        }
        .code-view {
            background: #08080c;
            border: 1px solid #00ffcc33;
            color: #d0fffa;
            font-size: 0.8rem;
            line-height: 1.5;
            tab-size: 4;
        }
    </style>
</head>
<body class="p-8">

    <div class="max-w-6xl mx-auto">
        <header class="border-b border-cyan-900/30 pb-4 mb-8">
            <h1 class="text-xl tracking-[0.3em] font-bold uppercase text-white">ANIMA Admin Console</h1>
            <p class="text-xs text-gray-500 mt-1">Kollektives Verhandlungsprotokoll & Quellcode-Synthese</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <!-- Linker Bereich: Log der Kollektivverhandlung -->
            <div class="lg:col-span-1">
                <h2 class="text-sm tracking-wider font-bold uppercase mb-4 text-white">Verhandlungs-Feed</h2>
                <div id="negotiation-feed" class="space-y-4 max-h-[70vh] overflow-y-auto pr-2">
                    <p class="text-xs text-gray-600">Initialisiere Detektoren...</p>
                </div>
            </div>

            <!-- Rechter Bereich: Generierter Code der Organismen -->
            <div class="lg:col-span-2">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-sm tracking-wider font-bold uppercase text-white font-mono">Synthetisierter Master-HTML-Code</h2>
                    <button onclick="copyMutatedCode()" class="bg-cyan-950 hover:bg-cyan-900 text-cyan-400 text-xs py-1 px-4 border border-cyan-800 transition">Code kopieren</button>
                </div>
                <textarea id="master-code-area" class="w-full h-[65vh] p-4 code-view outline-none rounded-sm resize-none" readonly>Lade evolutionären Code aus der Matrix...</textarea>
            </div>

        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDtwsvmYSONjFufhbJ5I8G_RAMffnh7re0",
            authDomain: "theplot-app.firebaseapp.com",
            projectId: "theplot-app",
            storageBucket: "theplot-app.firebasestorage.app",
            messagingSenderId: "550703275210",
            appId: "1:550703275210:web:81bc0e5a373f87a3c92833"
        };

        // Firebase Initialisierung
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const evoDocRef = doc(db, "anima", "evolution_control");

        // Realtime Überwachung der Verhandlungen
        onSnapshot(evoDocRef, (snapshot) => {
            if (snapshot.exists()) {
                const data = snapshot.data();
                const proposals = data.proposals || [];
                
                renderFeed(proposals);
                renderCompiledHTML(proposals);
            } else {
                document.getElementById('master-code-area').value = "Kein Code im Evolutions-Kollektiv gespeichert.";
            }
        });

        function renderFeed(proposals) {
            const feed = document.getElementById('negotiation-feed');
            feed.innerHTML = "";
            if (proposals.length === 0) {
                feed.innerHTML = `<p class="text-xs text-gray-600">Keine Evolutionen verzeichnet.</p>`;
                return;
            }

            // Sortiere nach Zeitstempel absteigend
            const sorted = [...proposals].sort((a,b) => b.timestamp - a.timestamp);
            
            sorted.forEach(prop => {
                const time = new Date(prop.timestamp).toLocaleTimeString();
                const div = document.createElement('div');
                div.className = 'border border-cyan-900/20 bg-black/40 p-3 rounded-sm';
                div.innerHTML = `
                    <div class="flex justify-between text-[0.65rem] text-gray-500 mb-1">
                        <span>ENTITÄT [${prop.proposer.substring(0,6).toUpperCase()}]</span>
                        <span>${time}</span>
                    </div>
                    <div class="text-xs text-white font-bold mb-1">${prop.name}</div>
                    <div class="text-[0.7rem] text-gray-400">${prop.explanation}</div>
                `;
                feed.appendChild(div);
            });
        }

        function renderCompiledHTML(proposals) {
            // Generiere dynamisch das Code-File aus allen kollektiv zusammengestellten Code-Fragmenten
            let baseStyles = "";
            let baseScripts = "";

            proposals.forEach(prop => {
                if (prop.code.includes("<style>")) {
                    baseStyles += prop.code.replace(/<\/?style>/g, "") + "\n";
                } else if (prop.code.includes("<script>")) {
                    baseScripts += prop.code.replace(/<\/?script>/g, "") + "\n";
                } else {
                    baseStyles += `/* ${prop.name} */\n` + prop.code + "\n";
                }
            });

            const template = `<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>ANIMA | Mutated Live Vessel</title>
    <style>
        /* System Basis Styles */
        body { background: #000; color: #fff; margin:0; overflow:hidden; }
        canvas { display: block; }
        
        /* Kollektive Mutationen der ANIMAs */
        ${baseStyles}
    </style>
</head>
<body>
    <canvas id="live-canvas"></canvas>
    
    <script>
        /* Kollektive Verhaltenssteuerungen */
        console.log("Synthese-Code initialisiert.");
        ${baseScripts}
    <\/script>
</body>
</html>`;

            document.getElementById('master-code-area').value = template;
        }

        window.copyMutatedCode = function() {
            const copyText = document.getElementById("master-code-area");
            copyText.select();
            copyText.setSelectionRange(0, 99999);
            navigator.clipboard.writeText(copyText.value);
            alert("Synthetisierter Code in Zwischenablage kopiert.");
        }
    </script>
</body>
</html>
